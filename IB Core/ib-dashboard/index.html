// ── GOOGLE AUTH ─────────────────────────────────────────────
let _token = null, _tokenExp = 0;
function b64url(str) { return btoa(unescape(encodeURIComponent(str))).replace(/\+/g,'-').replace(/\//g,'_').replace(/=/g,''); }
function bytesToB64url(buf) { let s=''; new Uint8Array(buf).forEach(b=>s+=String.fromCharCode(b)); return btoa(s).replace(/\+/g,'-').replace(/\//g,'_').replace(/=/g,''); }
async function getToken() {
  if (_token && Date.now() < _tokenExp-60000) return _token;
  const now=Math.floor(Date.now()/1000);
  const hdr=b64url(JSON.stringify({alg:'RS256',typ:'JWT'}));
  const pay=b64url(JSON.stringify({iss:CLIENT_EMAIL,scope:'https://www.googleapis.com/auth/spreadsheets',aud:'https://oauth2.googleapis.com/token',iat:now,exp:now+3600}));
  const si=`${hdr}.${pay}`;
  const pem=PRIVATE_KEY_B64.replace(/\s/g,'');
  const der=atob(pem); const db=new Uint8Array(der.length);
  for(let i=0;i<der.length;i++) db[i]=der.charCodeAt(i);
  const key=await crypto.subtle.importKey('pkcs8',db.buffer,{name:'RSASSA-PKCS1-v1_5',hash:'SHA-256'},false,['sign']);
  const sig=await crypto.subtle.sign('RSASSA-PKCS1-v1_5',key,new TextEncoder().encode(si));
  const jwt=`${si}.${bytesToB64url(sig)}`;
  const res=await fetch('https://oauth2.googleapis.com/token',{method:'POST',headers:{'Content-Type':'application/x-www-form-urlencoded'},body:`grant_type=urn%3Aietf%3Aparams%3Aoauth%3Agrant-type%3Ajwt-bearer&assertion=${jwt}`});
  const d=await res.json();
  if (!d.access_token) throw new Error(d.error_description||'Token fetch failed');
  _token=d.access_token; _tokenExp=Date.now()+d.expires_in*1000;
  return _token;
}

// ── SHEETS API ──────────────────────────────────────────────
const SBASE=`https://sheets.googleapis.com/v4/spreadsheets/${SPREADSHEET_ID}`;
async function sheetsGet(range) {
  const tok=await getToken();
  const r=await fetch(`${SBASE}/values/${encodeURIComponent(range)}`,{headers:{Authorization:`Bearer ${tok}`}});
  const d=await r.json(); if(!r.ok) throw new Error(d.error?.message||'Read error');
  return d.values||[];
}
async function sheetsPut(range,values) {
  const tok=await getToken();
  const r=await fetch(`${SBASE}/values/${encodeURIComponent(range)}?valueInputOption=RAW`,{method:'PUT',headers:{Authorization:`Bearer ${tok}`,'Content-Type':'application/json'},body:JSON.stringify({range,majorDimension:'ROWS',values})});
  const d=await r.json(); if(!r.ok) throw new Error(d.error?.message||'Write error');
  return d;
}
async function sheetsAppend(range,values) {
  const tok=await getToken();
  const r=await fetch(`${SBASE}/values/${encodeURIComponent(range)}:append?valueInputOption=RAW&insertDataOption=INSERT_ROWS`,{method:'POST',headers:{Authorization:`Bearer ${tok}`,'Content-Type':'application/json'},body:JSON.stringify({range,majorDimension:'ROWS',values})});
  const d=await r.json(); if(!r.ok) throw new Error(d.error?.message||'Append error');
  return d;
}

function Spinner({size='sm'}){const cl=size==='lg'?'w-8 h-8':'w-4 h-4';return <svg className={`${cl} animate-spin text-indigo-500`} fill="none" viewBox="0 0 24 24"><circle className="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" strokeWidth="4"/><path className="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"/></svg>;}
function SaveBadge({status}){if(!status)return null;return <span className={`text-xs font-medium ${status==='saving'?'text-slate-400':'text-emerald-600'}`}>{status==='saving'?'Saving…':'✓ Saved'}</span>;}
function PBadge({done,total}){const pct=total===0?0:done/total;const cl=pct===1?'bg-emerald-100 text-emerald-700':pct>0?'bg-amber-100 text-amber-700':'bg-slate-100 text-slate-400';return <span className={`ml-2 text-xs font-bold px-2 py-0.5 rounded-full ${cl}`}>{done}/{total}</span>;}
function CopyBtn({text}){const[c,setC]=useState(false);const go=()=>{navigator.clipboard.writeText(text||'').then(()=>{setC(true);setTimeout(()=>setC(false),2000);}).catch(()=>{});};return <button onClick={go} className="flex items-center gap-1 text-xs font-medium text-slate-400 hover:text-indigo-600 px-2 py-1 rounded hover:bg-indigo-50 transition-colors"><svg className="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><rect x="9" y="9" width="13" height="13" rx="2" strokeWidth="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1" strokeWidth="2"/></svg>{c?'Copied!':'Copy'}</button>;}

function ErrorBanner({msg,onDismiss}){if(!msg)return null;return <div className="fixed top-4 right-4 z-50 flex items-center gap-3 bg-rose-50 border border-rose-200 text-rose-700 text-sm font-medium rounded-xl px-4 py-3 shadow-lg max-w-sm"><svg className="w-4 h-4 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg><span className="flex-1">{msg}</span><button onClick={onDismiss} className="text-rose-400 hover:text-rose-600 text-lg leading-none">×</button></div>;}

// ── IBCheckbox (with overdue support) ────────────────────────
function IBCheckbox({label,checked,onChange,readOnly=false,overdue=false}){
  return <label className={`flex items-start gap-3 w-full ${readOnly?'':'cursor-pointer group'}`} onClick={readOnly?undefined:()=>onChange(!checked)}>
    <div className={`mt-0.5 flex-shrink-0 w-5 h-5 rounded border-2 flex items-center justify-center transition-all
      ${checked?'bg-indigo-600 border-indigo-600'
        :overdue?'border-rose-400 bg-rose-50'
        :`border-slate-300 bg-white ${readOnly?'':'group-hover:border-indigo-400'}`}
      ${readOnly?'opacity-80':''}`}>
      {checked&&<svg className="w-3 h-3 text-white" fill="none" viewBox="0 0 12 12" stroke="currentColor" strokeWidth="2.5"><path d="M2 6l3 3 5-5"/></svg>}
    </div>
    <span className={`text-sm leading-snug select-none flex-1 ${checked?'text-slate-800 font-medium':overdue?'text-rose-700 font-medium':'text-slate-500'}`}>{label}</span>
    {overdue&&!checked&&<span className="flex-shrink-0 text-xs bg-rose-100 text-rose-600 font-bold px-1.5 py-0.5 rounded-full">Overdue</span>}
  </label>;
}

// ── CheckItem: checkbox + overdue toggle ─────────────────────
function CheckItem({label,checked,onChange,overdue=false,onOverdueToggle,readOnly=false}){
  return <div className="flex items-center gap-2">

    {!readOnly&&!checked&&onOverdueToggle&&
      <button onClick={e=>{e.stopPropagation();onOverdueToggle();}}
        className={`flex-shrink-0 text-xs px-2 py-0.5 rounded-md font-semibold border transition-all ${overdue?'bg-rose-100 border-rose-200 text-rose-600 hover:bg-rose-200':'border-slate-200 text-slate-300 hover:text-rose-400 hover:border-rose-200 hover:bg-rose-50'}`}
        title={overdue?'Clear overdue':'Mark as overdue'}>
        {overdue?'⚑':'⚐'}

  </div>;
}

// ── ExpandTextarea (expandable with modal + word count) ──────
function ExpandTextarea({value,onChange,onBlur,readOnly=false,placeholder='Add comment…',rows=3}){
  const [open,setOpen]=useState(false);
  const wc=value?value.trim().split(/\s+/).filter(Boolean).length:0;
  const cc=value?value.length:0;
  return <>
    <div className="relative">
      <textarea value={value} onChange={e=>onChange(e.target.value)} onBlur={onBlur} readOnly={readOnly}
        placeholder={placeholder} rows={rows}
        className={`w-full text-sm px-3 py-2 border rounded-lg resize-none leading-relaxed ${readOnly?'border-transparent bg-slate-50 text-slate-700 cursor-default':'border-slate-200 focus:outline-none focus:ring-2 focus:ring-indigo-400 pr-8'}`}/>
      {!readOnly&&<button onClick={()=>setOpen(true)} title="Expand editor"
        className="absolute top-2 right-2 text-slate-300 hover:text-indigo-500 transition-colors">
        <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M4 8V4m0 0h4M4 4l5 5m11-5h-4m4 0v4m0-4l-5 5M4 16v4m0 0h4m-4 0l5-5m11 5l-5-5m5 5v-4m0 4h-4"/></svg>
      </button>}
    </div>
    {open&&<div className="fixed inset-0 bg-black/50 flex items-center justify-center p-4 z-50">
      <div className="bg-white rounded-2xl shadow-2xl w-full max-w-2xl fade-in">
        <div className="flex items-center justify-between px-6 py-4 border-b border-slate-100">
          <h3 className="font-bold text-slate-800">Edit Comment</h3>
          <button onClick={()=>setOpen(false)} className="text-slate-400 hover:text-slate-600 text-2xl leading-none">×</button>
        </div>
        <div className="p-6">
          <textarea autoFocus value={value} onChange={e=>onChange(e.target.value)}
            rows={14} placeholder={placeholder}
            className="w-full text-sm px-3 py-2.5 border border-slate-200 rounded-lg resize-none leading-relaxed focus:outline-none focus:ring-2 focus:ring-indigo-400"/>
          <div className="flex items-center justify-between mt-3">
            <span className="text-xs text-slate-400">{wc} words · {cc} characters</span>
            <button onClick={()=>{onBlur&&onBlur();setOpen(false);}}
              className="px-5 py-2 bg-indigo-600 text-white font-bold rounded-xl text-sm hover:bg-indigo-700">Done</button>
          </div>
        </div>
      </div>
    </div>}
  </>;
}

// ── LOGIN ────────────────────────────────────────────────────
async function hashPassword(plain){const buf=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(plain));return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');}

function LoginCard({role,icon,title,subtitle,userLabel,userPlaceholder,onLogin}){
  const [user,setUser]=useState('');
  const [pass,setPass]=useState('');
  const [loading,setLoading]=useState(false);
  const [error,setError]=useState('');
  const colorMap={student:'indigo',teacher:'violet',admin:'slate'};
  const c=colorMap[role];
  const submit=async e=>{
    e.preventDefault();setError('');setLoading(true);
    try{
      if(role==='teacher'){
        const hashed=await hashPassword(pass);
        if(user===TEACHER_CREDS.username&&hashed===TEACHER_CREDS.password)onLogin({role:'teacher',name:'Teacher'});
        else setError('Incorrect credentials.');
      } else if(role==='admin'){
        const hashed=await hashPassword(pass);
        if(user===ADMIN_CREDS.username&&hashed===ADMIN_CREDS.password)onLogin({role:'admin',name:'IB Coordinator'});
        else setError('Incorrect credentials.');
      } else {
        const rows=await sheetsGet('Students!A:E');
        const students=parseStudents(rows);
        const m=students.find(s=>(s.student_id===user||s.name.toLowerCase()===user.toLowerCase())&&s.password===pass);
        if(m)onLogin({role:'student',name:m.name,student_id:m.student_id});
        else setError('Student not found or wrong password.');
      }
    }catch(err){setError(err.message||'Login failed.');}
    setLoading(false);
  };
  return <div className="bg-white rounded-2xl shadow-sm border border-slate-100 p-5 fade-in">
    <div className="flex items-center gap-3 mb-4">
      <div className={`w-10 h-10 rounded-xl bg-${c}-100 flex items-center justify-center flex-shrink-0`}>{icon}</div>
      <div><p className={`font-extrabold text-slate-800 text-base`}>{title}</p><p className="text-xs text-slate-400">{subtitle}</p></div>
    </div>
    <form onSubmit={submit} className="space-y-3">
      <div><label className="block text-xs font-bold text-slate-400 uppercase tracking-wide mb-1">{userLabel}</label>
        <input type="text" value={user} onChange={e=>setUser(e.target.value)} required placeholder={userPlaceholder}
          className="w-full px-3 py-2 border border-slate-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400 bg-slate-50"/></div>
      <div><label className="block text-xs font-bold text-slate-400 uppercase tracking-wide mb-1">Password</label>
        <input type="password" value={pass} onChange={e=>setPass(e.target.value)} required
          className="w-full px-3 py-2 border border-slate-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400 bg-slate-50"/></div>
      {error&&<div className="text-xs text-rose-600 bg-rose-50 border border-rose-100 rounded-lg px-3 py-2">{error}</div>}
      <button type="submit" disabled={loading}
        className={`w-full py-2 bg-${c}-600 hover:bg-${c}-700 text-white font-bold rounded-xl flex items-center justify-center gap-2 disabled:opacity-60 text-sm transition-colors`}>
        {loading?<><Spinner/>Signing in…</>:`Sign in as ${title}`}
      </button>
    </form>
  </div>;
}

function TOKTab({tok,onChange,onSave}){
  const [sub,setSub]=useState('exhibition');

  const exDone=[tok.exhibition_planning_conference,tok.exhibition_written_feedback,tok.exhibition_final_draft_in].filter(Boolean).length;
  const essDone=[tok.essay_interaction_1,tok.essay_interaction_2,tok.essay_interaction_3,tok.essay_final_draft_submitted].filter(Boolean).length;
  const upd=(key,val)=>{const n={...tok,[key]:val};onChange(n);return n;};
  const updAndSave=(key,val)=>{const n={...tok,[key]:val};onChange(n);onSave(n);};
  const blur=()=>onSave(tok);
  const toggleOverdue=(key)=>{const od={...tok.overdue};if(od[key])delete od[key];else od[key]=true;const n={...tok,overdue:od};onChange(n);onSave(n);};

  return <div className="fade-in">
    <div className="flex gap-2 mb-6">
      {[['exhibition',exDone,3],['essay',essDone,4]].map(([t,done,total])=><button key={t} onClick={()=>setSub(t)} className={`flex items-center px-4 py-1.5 rounded-full text-sm font-semibold transition-all capitalize ${sub===t?'bg-indigo-600 text-white shadow':'bg-slate-100 text-slate-600 hover:bg-slate-200'}`}>{t}<PBadge done={done} total={total}/></button>)}

    {sub==='exhibition'&&<div className="space-y-5 fade-in">
      <Card className="p-5">
        <SectionTitle>Checkpoints</SectionTitle>
        <div className="space-y-3">

          <CheckItem label="Written Feedback" checked={tok.exhibition_written_feedback} onChange={v=>updAndSave('exhibition_written_feedback',v)} overdue={!!tok.overdue?.exhibition_written_feedback} onOverdueToggle={()=>toggleOverdue('exhibition_written_feedback')}/>
          <CheckItem label="Final Draft In" checked={tok.exhibition_final_draft_in} onChange={v=>updAndSave('exhibition_final_draft_in',v)} overdue={!!tok.overdue?.exhibition_final_draft_in} onOverdueToggle={()=>toggleOverdue('exhibition_final_draft_in')}/>

        <ScoreDropdown label="Exhibition Score" value={tok.exhibition_score} onChange={v=>{const n=upd('exhibition_score',v);onSave(n);}}/>
      </Card>
      <Card className="p-5">
        <SectionTitle action={<CopyBtn text={tok.exhibition_comment}/>}>Teacher Comment</SectionTitle>
        <ExpandTextarea value={tok.exhibition_comment} onChange={v=>upd('exhibition_comment',v)} onBlur={blur}/>
      </Card>
    </div>}

    {sub==='essay'&&<div className="space-y-5 fade-in">
      <Card className="p-5">
        <SectionTitle>Interactions &amp; Notes</SectionTitle>
        <div className="space-y-5">
          {[1,2,3].map(n=>{
            const ck=`essay_interaction_${n}`;

function ClassOverview({students,tokData,casData,eeData,onSelectStudent}){
  const [filter,setFilter]=useState('all');
  const [search,setSearch]=useState('');
  const getTOK=id=>tokData.find(t=>t.student_id===id)||{};
  const getCAS=id=>casData.find(c=>c.student_id===id)||{};
  const getEE =id=>eeData.find(e=>e.student_id===id)||{};
  const filtered=students.filter(s=>s.name.toLowerCase().includes(search.toLowerCase())||s.student_id.toLowerCase().includes(search.toLowerCase()));

  // Dot: green=done, red=overdue, grey=not started
  const Dot=({on,od=false})=>on
    ?<span className="inline-block w-4 h-4 rounded-full bg-emerald-400" title="Complete"/>
    :od?<span className="inline-block w-4 h-4 rounded-full bg-rose-400" title="Overdue"/>
    :<span className="inline-block w-4 h-4 rounded-full bg-slate-200 border border-slate-300" title="Not done"/>;
  const ScoreCell=({v})=><span className={`text-xs font-bold ${v?'text-indigo-600':'text-slate-300'}`}>{v||'—'}</span>;

  // Cell class helpers
  const thM="px-2 py-2 text-center text-xs font-bold text-slate-400 uppercase tracking-wide border-b border-slate-200 ov-sep-minor";
  const thB="px-2 py-2 text-center text-xs font-bold text-slate-400 uppercase tracking-wide border-b border-slate-200 ov-sep-major";
  const td=(od=false)=>`px-2 py-2.5 text-center border-b border-slate-50 ov-sep-minor${od?' ov-cell-overdue':''}`;
  const tdB=(od=false)=>`px-2 py-2.5 text-center border-b border-slate-50 ov-sep-major${od?' ov-cell-overdue':''}`;
  const GH=({label,cols,color,major=false})=><th colSpan={cols} className={`px-2 py-1.5 text-xs font-extrabold uppercase tracking-wider text-center text-${color}-600 bg-${color}-50 border-b border-slate-200 ${major?'ov-sep-major':'ov-sep-minor'}`}>{label}</th>;

  return <div className="flex flex-col h-full overflow-hidden">
    <div className="flex flex-wrap items-center gap-3 p-4 pb-3 flex-shrink-0">
      <div className="relative flex-1 min-w-48">
        <svg className="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
        <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Filter students…" className="w-full pl-9 pr-3 py-2 text-sm border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-400 bg-slate-50"/>
      </div>
      <div className="flex gap-1 p-1 bg-slate-100 rounded-xl">
        {[['all','All'],['tok','TOK'],['cas','CAS'],['ee','EE']].map(([v,l])=><button key={v} onClick={()=>setFilter(v)} className={`px-3 py-1.5 text-xs font-bold rounded-lg transition-all ${filter===v?'bg-white shadow text-indigo-600':'text-slate-500 hover:text-slate-700'}`}>{l}</button>)}
      </div>
      <div className="flex items-center gap-3 text-xs text-slate-400 font-medium">
        <span className="flex items-center gap-1.5"><span className="inline-block w-3 h-3 rounded-full bg-emerald-400"/>Done</span>
        <span className="flex items-center gap-1.5"><span className="inline-block w-3 h-3 rounded-full bg-rose-400"/>Overdue</span>
        <span className="flex items-center gap-1.5"><span className="inline-block w-3 h-3 rounded-full bg-slate-200 border border-slate-300"/>Pending</span>
      </div>
    </div>
    <div className="flex-1 overflow-auto px-4 pb-4">
      <div className="bg-white rounded-2xl border border-slate-100 shadow-sm overflow-x-auto">
        <table className="ov-table text-sm w-full border-collapse">
          <thead>
            <tr>
              <th rowSpan={2} className="px-4 py-3 text-left text-xs font-bold text-slate-500 uppercase tracking-wide border-b border-slate-200 bg-white sticky left-0 z-10 min-w-40 ov-sep-major">Student</th>
              {(filter==='all'||filter==='tok')&&<>
                <GH label="Exhibition" cols={4} color="violet"/>
                <GH label="Essay" cols={5} color="violet" major={filter!=='tok'}/>
              </>}
              {(filter==='all'||filter==='cas')&&<>
                <GH label="CAS Interviews" cols={3} color="sky"/>
                <GH label="Project" cols={2} color="sky"/>
                <GH label="Strands" cols={3} color="sky"/>
                <GH label="Outcomes" cols={1} color="sky" major={filter!=='cas'}/>
              </>}
              {(filter==='all'||filter==='ee')&&<>
                <GH label="EE Progress" cols={3} color="teal"/>
                <GH label="Sup Interactions" cols={3} color="teal"/>
                <GH label="Reflections" cols={3} color="teal"/>
                <GH label="Extra" cols={3} color="teal" major/>
              </>}
            </tr>
            <tr>
              {(filter==='all'||filter==='tok')&&<>
                <th className={thM}>Plan</th><th className={thM}>FB</th><th className={thM}>Draft</th><th className={thB}>Score</th>
                <th className={thM}>Int1</th><th className={thM}>Int2</th><th className={thM}>Int3</th><th className={thM}>Final</th><th className={filter==='tok'?thB:thB}>Score</th>
              </>}
              {(filter==='all'||filter==='cas')&&<>
                <th className={thM}>Int1</th><th className={thM}>Int2</th><th className={thB}>Final</th>
                <th className={thM}>Dec</th><th className={thB}>Done</th>
                <th className={thM}>C</th><th className={thM}>A</th><th className={thB}>S</th>
                <th className={filter==='cas'?thB:thB}>Out</th>
              </>}
              {(filter==='all'||filter==='ee')&&<>
                <th className={thM}>Bib</th><th className={thM}>Draft</th><th className={thB}>Final</th>
                <th className={thM}>Int1</th><th className={thM}>Int2</th><th className={thB}>Int3</th>
                <th className={thM}>Ref1</th><th className={thM}>Ref2</th><th className={thB}>Final</th>
                <th className={thM}>Sup✓</th><th className={thM}>Hrs</th><th className={thB}>Score</th>
              </>}
            </tr>
          </thead>
          <tbody>
            {filtered.map(s=>{
              const t=getTOK(s.student_id),c=getCAS(s.student_id),e=getEE(s.student_id);
              const tod=t.overdue||{},cod=c.overdue||{},eod=e.overdue||{};
              const outDone=[1,2,3,4,5,6,7].filter(i=>c[`outcome_${i}`]).length;
              const mbReady=!!(t.essay_comment);
              return <tr key={s.student_id} className="hover:bg-slate-50 transition-colors">
                <td className="px-4 py-2.5 border-b border-slate-50 sticky left-0 bg-white z-10 ov-sep-major">
                  <button onClick={()=>onSelectStudent(s.student_id)} className="font-semibold text-indigo-600 hover:underline text-sm text-left block">{s.name}</button>
                  <div className="text-xs text-slate-400">{s.student_id}</div>
                </td>
                {(filter==='all'||filter==='tok')&&<>
                  <td className={td(!t.exhibition_planning_conference&&tod.exhibition_planning_conference)}><Dot on={t.exhibition_planning_conference} od={tod.exhibition_planning_conference}/></td>
                  <td className={td(!t.exhibition_written_feedback&&tod.exhibition_written_feedback)}><Dot on={t.exhibition_written_feedback} od={tod.exhibition_written_feedback}/></td>
                  <td className={td(!t.exhibition_final_draft_in&&tod.exhibition_final_draft_in)}><Dot on={t.exhibition_final_draft_in} od={tod.exhibition_final_draft_in}/></td>
                  <td className={tdB()}><ScoreCell v={t.exhibition_score}/></td>
                  <td className={td(!t.essay_interaction_1&&tod.essay_interaction_1)}><Dot on={t.essay_interaction_1} od={tod.essay_interaction_1}/></td>
                  <td className={td(!t.essay_interaction_2&&tod.essay_interaction_2)}><Dot on={t.essay_interaction_2} od={tod.essay_interaction_2}/></td>
                  <td className={td(!t.essay_interaction_3&&tod.essay_interaction_3)}><Dot on={t.essay_interaction_3} od={tod.essay_interaction_3}/></td>
                  <td className={td(!t.essay_final_draft_submitted&&tod.essay_final_draft_submitted)}><Dot on={t.essay_final_draft_submitted} od={tod.essay_final_draft_submitted}/></td>
                  <td className={tdB()}><ScoreCell v={t.essay_score}/></td>
                </>}
                {(filter==='all'||filter==='cas')&&<>
                  <td className={td()}><Dot on={!!c.interview_1_date}/></td>
                  <td className={td()}><Dot on={!!c.interview_2_date}/></td>
                  <td className={tdB()}><Dot on={!!c.interview_final_date}/></td>
                  <td className={td(!c.cas_project_decided&&cod.cas_project_decided)}><Dot on={c.cas_project_decided} od={cod.cas_project_decided}/></td>
                  <td className={tdB(!c.cas_project_complete&&cod.cas_project_complete)}><Dot on={c.cas_project_complete} od={cod.cas_project_complete}/></td>
                  <td className={td()}><Dot on={c.strand_creativity}/></td>
                  <td className={td()}><Dot on={c.strand_activity}/></td>
                  <td className={tdB()}><Dot on={c.strand_service}/></td>
                  <td className={tdB()}><span className={`text-xs font-bold px-1.5 py-0.5 rounded-full ${outDone===7?'bg-emerald-100 text-emerald-700':outDone>0?'bg-amber-100 text-amber-700':'bg-slate-100 text-slate-400'}`}>{outDone}/7</span></td>
                </>}
                {(filter==='all'||filter==='ee')&&<>
                  <td className={td(!e.annotated_bibliography&&eod.annotated_bibliography)}><Dot on={e.annotated_bibliography} od={eod.annotated_bibliography}/></td>
                  <td className={td(!e.draft_submitted&&eod.draft_submitted)}><Dot on={e.draft_submitted} od={eod.draft_submitted}/></td>
                  <td className={tdB(!e.final_draft_submitted&&eod.final_draft_submitted)}><Dot on={e.final_draft_submitted} od={eod.final_draft_submitted}/></td>
                  <td className={td(!e.supervisor_interaction_1&&eod.supervisor_interaction_1)}><Dot on={e.supervisor_interaction_1} od={eod.supervisor_interaction_1}/></td>
                  <td className={td(!e.supervisor_interaction_2&&eod.supervisor_interaction_2)}><Dot on={e.supervisor_interaction_2} od={eod.supervisor_interaction_2}/></td>
                  <td className={tdB(!e.supervisor_interaction_3&&eod.supervisor_interaction_3)}><Dot on={e.supervisor_interaction_3} od={eod.supervisor_interaction_3}/></td>
                  <td className={td(!e.reflection_1&&eod.reflection_1)}><Dot on={e.reflection_1} od={eod.reflection_1}/></td>
                  <td className={td(!e.reflection_2&&eod.reflection_2)}><Dot on={e.reflection_2} od={eod.reflection_2}/></td>
                  <td className={tdB(!e.reflection_3_final&&eod.reflection_3_final)}><Dot on={e.reflection_3_final} od={eod.reflection_3_final}/></td>
                  <td className={td(!e.supervisor_comments_complete&&eod.supervisor_comments_complete)}><Dot on={e.supervisor_comments_complete} od={eod.supervisor_comments_complete}/></td>
                  <td className={td()}><span className={`text-xs font-semibold ${e.hours?'text-slate-700':'text-slate-300'}`}>{e.hours||'—'}</span></td>
                  <td className={tdB()}><ScoreCell v={e.score}/></td>
                </>}
              </tr>;
            })}
          </tbody>
        </table>
        {filtered.length===0&&<div className="py-16 text-center text-slate-400 text-sm">No students match</div>}
      </div>
      <p className="text-xs text-slate-400 mt-3 text-center">{filtered.length} of {students.length} students · Click a student name to open their page</p>
    </div>
  </div>;
}

// ── ADD STUDENT MODAL ────────────────────────────────────────
function AddStudentModal({onClose,onAdd}){
  const [form,setForm]=useState({name:'',student_id:'',password:''});
  const [loading,setLoading]=useState(false);
  const [error,setError]=useState('');
  const f=key=>e=>setForm(p=>({...p,[key]:e.target.value}));
  const submit=async e=>{
    e.preventDefault();
    if(!form.student_id||!form.name){setError('Name and Student ID are required.');return;}
    setLoading(true);setError('');
    try{await onAdd(form);onClose();}catch(err){setError(err.message);}
    setLoading(false);
  };
  return <div className="fixed inset-0 bg-black/40 flex items-center justify-center p-4 z-50">
    <div className="bg-white rounded-2xl shadow-2xl w-full max-w-sm fade-in">
      <div className="flex items-center justify-between px-6 py-4 border-b border-slate-100"><h2 className="font-bold text-slate-800">Add Student</h2><button onClick={onClose} className="text-slate-400 hover:text-slate-600 text-2xl leading-none">×</button></div>
      <form onSubmit={submit} className="p-6 space-y-4">
        {[['Full Name','name',true],['Student ID','student_id',true],['Password','password',false]].map(([label,key,req])=><div key={key}><label className="block text-xs font-bold text-slate-500 uppercase tracking-wide mb-1.5">{label}{req&&' *'}</label><input type="text" value={form[key]} onChange={f(key)} required={req} className="w-full px-3.5 py-2.5 border border-slate-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400"/></div>)}
        <p className="text-xs text-slate-400">EE subject and RQ can be filled in from the EE tab after adding.</p>
        {error&&<div className="text-sm text-rose-600 bg-rose-50 border border-rose-100 rounded-xl px-3.5 py-2.5">{error}</div>}
        <div className="flex gap-3 pt-1">
          <button type="button" onClick={onClose} className="flex-1 py-2.5 border border-slate-200 text-slate-600 font-semibold rounded-xl hover:bg-slate-50 text-sm">Cancel</button>
          <button type="submit" disabled={loading} className="flex-1 py-2.5 bg-indigo-600 hover:bg-indigo-700 text-white font-bold rounded-xl text-sm flex items-center justify-center gap-2 disabled:opacity-60">{loading?<><Spinner/>Adding…</>:'Add Student'}</button>
        </div>
      </form>
    </div>
  </div>;
}

// ── TEACHER DASHBOARD ─────────────────────────────────────────
function TeacherDashboard({students,tokData,casData,eeData,onUpdate,onAddStudent,onLogout,saveStatus,error,onDismissError}){
  const [view,setView]=useState('student');
  const [selectedId,setSelectedId]=useState(null);
  const [tab,setTab]=useState('tok');
  const [search,setSearch]=useState('');
  const [showAdd,setShowAdd]=useState(false);
  const [mobileSidebar,setMobileSidebar]=useState(false);

  const filtered=students.filter(s=>s.name.toLowerCase().includes(search.toLowerCase())||s.student_id.toLowerCase().includes(search.toLowerCase()));
  const selStudent=students.find(s=>s.student_id===selectedId);
  const selTOK=tokData.find(t=>t.student_id===selectedId);
  const selCAS=casData.find(c=>c.student_id===selectedId);
  const selEE =eeData.find(e=>e.student_id===selectedId);
  const tokIdx=tokData.findIndex(t=>t.student_id===selectedId);
  const casIdx=casData.findIndex(c=>c.student_id===selectedId);
  const eeIdx =eeData.findIndex(e=>e.student_id===selectedId);

  const handleSelectStudent=(id)=>{setSelectedId(id);setView('student');setMobileSidebar(false);};

  return <div className="flex flex-col h-screen bg-slate-50">
    <header className="flex-shrink-0 bg-white border-b border-slate-100 px-4 sm:px-6 py-3 flex items-center justify-between z-20">
      <div className="flex items-center gap-2 flex-wrap">
        {view==='student'&&<button onClick={()=>setMobileSidebar(!mobileSidebar)} className="sm:hidden p-2 rounded-lg hover:bg-slate-100"><svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M4 6h16M4 12h16M4 18h16"/></svg></button>}
        <div className="flex items-center gap-2"><div className="w-8 h-8 rounded-lg bg-indigo-600 flex items-center justify-center"><svg className="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.746 0 3.332.477 4.5 1.253v13C19.832 18.477 18.246 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"/></svg></div><span className="font-extrabold text-slate-800 tracking-tight">IB Core</span></div>
        <div className="flex gap-0.5 p-0.5 bg-slate-100 rounded-lg">
          <button onClick={()=>setView('student')} className={`flex items-center gap-1.5 px-3 py-1.5 text-xs font-bold rounded-md transition-all ${view==='student'?'bg-white shadow text-indigo-600':'text-slate-500 hover:text-slate-700'}`}><svg className="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>Student</button>
          <button onClick={()=>setView('overview')} className={`flex items-center gap-1.5 px-3 py-1.5 text-xs font-bold rounded-md transition-all ${view==='overview'?'bg-white shadow text-indigo-600':'text-slate-500 hover:text-slate-700'}`}><svg className="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M4 6h16M4 10h16M4 14h16M4 18h16"/></svg>Class Overview</button>
        </div>
      </div>
      <div className="flex items-center gap-3"><SaveBadge status={saveStatus}/><span className="hidden sm:block text-xs text-slate-400 font-medium bg-slate-100 px-2.5 py-1 rounded-full">Teacher</span><button onClick={onLogout} className="text-sm text-slate-500 hover:text-slate-700 font-medium">Log out</button></div>
    </header>

    {view==='overview'
      ?<div className="flex-1 overflow-hidden flex flex-col"><ClassOverview students={students} tokData={tokData} casData={casData} eeData={eeData} onSelectStudent={handleSelectStudent}/></div>
      :<div className="flex flex-1 overflow-hidden">
        <aside className={`${mobileSidebar?'flex':'hidden'} sm:flex flex-col w-72 border-r border-slate-100 bg-white flex-shrink-0 absolute sm:relative inset-0 z-30 sm:z-auto`}>
          <div className="p-4 border-b border-slate-50">
            <div className="relative mb-3"><svg className="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg><input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Search students…" className="w-full pl-9 pr-3 py-2 text-sm border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-400 bg-slate-50"/></div>
            <button onClick={()=>setShowAdd(true)} className="w-full flex items-center justify-center gap-2 py-2 text-sm font-bold text-indigo-600 bg-indigo-50 hover:bg-indigo-100 rounded-xl transition-colors"><span className="text-lg leading-none">+</span> Add Student</button>
          </div>
          <div className="flex-1 overflow-y-auto">
            {filtered.length===0&&<p className="text-sm text-slate-400 text-center py-8">No students found</p>}
            {filtered.map(s=>{
              const tok_=tokData.find(t=>t.student_id===s.student_id)||{};
              const ee_=eeData.find(e=>e.student_id===s.student_id)||{};
              const cas_=casData.find(c=>c.student_id===s.student_id)||{};
              const exDone=[tok_.exhibition_planning_conference,tok_.exhibition_written_feedback,tok_.exhibition_final_draft_in].filter(Boolean).length;
              const eeDone=[ee_.annotated_bibliography,ee_.draft_submitted,ee_.final_draft_submitted].filter(Boolean).length;
              const tokOverdue=tok_.overdue?Object.values(tok_.overdue).filter(Boolean).length:0;
              const casOverdue=cas_.overdue?Object.values(cas_.overdue).filter(Boolean).length:0;
              const eeOverdue=ee_.overdue?Object.values(ee_.overdue).filter(Boolean).length:0;
              const totalOverdue=tokOverdue+casOverdue+eeOverdue;
              return <button key={s.student_id} onClick={()=>handleSelectStudent(s.student_id)} className={`w-full text-left px-4 py-3.5 border-b border-slate-50 transition-all hover:bg-slate-50 ${selectedId===s.student_id?'bg-indigo-50 border-l-4 border-l-indigo-600':'border-l-4 border-l-transparent'}`}>
                <div className="flex items-center justify-between"><span className="font-semibold text-slate-800 text-sm">{s.name}</span>{totalOverdue>0&&<span className="text-xs bg-rose-100 text-rose-600 font-bold px-1.5 py-0.5 rounded-full">{totalOverdue} overdue</span>}</div>
                <div className="text-xs text-slate-400 mt-0.5 flex items-center gap-3"><span>{s.student_id}</span><span className="text-slate-300">·</span><span>TOK {exDone}/3</span><span className="text-slate-300">·</span><span>EE {eeDone}/3</span></div>
              </button>;
            })}
          </div>
          <div className="p-3 border-t border-slate-100"><p className="text-xs text-slate-400 text-center">{students.length} students</p></div>
        </aside>
        <main className="flex-1 overflow-y-auto">
          {!selStudent
            ?<div className="flex flex-col items-center justify-center h-full text-center p-8">
              <div className="w-20 h-20 rounded-2xl bg-slate-100 flex items-center justify-center mb-4"><svg className="w-10 h-10 text-slate-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="1.5" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0z"/></svg></div>
              <h3 className="font-bold text-slate-700 text-lg">Select a student</h3>
              <p className="text-slate-400 text-sm mt-1">Or switch to Class Overview to see everyone at once</p>
            </div>
            :<div className="p-5 sm:p-6 max-w-3xl">
              <div className="mb-6"><h2 className="text-xl font-extrabold text-slate-800">{selStudent.name}</h2><p className="text-sm text-slate-400 mt-0.5">{selStudent.student_id} · {selStudent.ee_subject||'EE subject TBC'}</p></div>
              <div className="flex gap-1 p-1 bg-slate-100 rounded-xl mb-6 w-fit">
                {['tok','cas','ee'].map(t=><button key={t} onClick={()=>setTab(t)} className={`px-5 py-2 text-sm font-bold rounded-lg transition-all uppercase tracking-wide ${tab===t?'bg-white shadow text-indigo-600':'text-slate-500 hover:text-slate-700'}`}>{t}</button>)}
              </div>
              {tab==='tok'&&<TOKTab tok={selTOK} onChange={n=>onUpdate('tok',n,tokIdx,false)} onSave={n=>onUpdate('tok',n,tokIdx,true)}/>}
              {tab==='cas'&&<CASTab cas={selCAS} onChange={n=>onUpdate('cas',n,casIdx,false)} onSave={n=>onUpdate('cas',n,casIdx,true)}/>}
              {tab==='ee'&&<EETab ee={selEE} onChange={n=>onUpdate('ee',n,eeIdx,false)} onSave={n=>onUpdate('ee',n,eeIdx,true)}/>}
            </div>
          }
        </main>
      </div>
    }
    {showAdd&&<AddStudentModal onClose={()=>setShowAdd(false)} onAdd={onAddStudent}/>}
    <ErrorBanner msg={error} onDismiss={onDismissError}/>
  </div>;
}

// ── ADMIN DASHBOARD ──────────────────────────────────────────
function AdminDashboard({students,tokData,casData,eeData,onLogout,error,onDismissError}){
  const [tab,setTab]=useState('tok');
  const getTOK=id=>tokData.find(t=>t.student_id===id)||{};
  const getCAS=id=>casData.find(c=>c.student_id===id)||{};
  const getEE =id=>eeData.find(e=>e.student_id===id)||{};

  const Tick=({v,od=false})=>{
    if(v) return <span className="inline-flex items-center justify-center w-5 h-5 rounded-full bg-emerald-100 text-emerald-600 text-xs">✓</span>;
    if(od) return <span className="inline-flex items-center justify-center w-5 h-5 rounded-full bg-rose-100 text-rose-600 text-xs font-bold">!</span>;
    return <span className="inline-flex items-center justify-center w-5 h-5 rounded-full bg-slate-100 text-slate-300 text-xs">–</span>;
  };

  const thM="px-3 py-3 font-bold text-slate-500 text-xs uppercase tracking-wide text-center border-r border-slate-100";
  const thB="px-3 py-3 font-bold text-slate-500 text-xs uppercase tracking-wide text-center border-r-2 border-slate-300";
  const td=(od=false)=>`px-3 py-3 text-center border-r border-slate-100 border-b border-slate-50${od?' bg-rose-50':''}`;
  const tdB=(od=false)=>`px-3 py-3 text-center border-r-2 border-slate-300 border-b border-slate-50${od?' bg-rose-50':''}`;

  return <div className="flex flex-col h-screen bg-slate-50">
    <header className="flex-shrink-0 bg-white border-b border-slate-100 px-6 py-3 flex items-center justify-between">
      <div className="flex items-center gap-2"><div className="w-8 h-8 rounded-lg bg-slate-700 flex items-center justify-center"><svg className="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.746 0 3.332.477 4.5 1.253v13C19.832 18.477 18.246 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"/></svg></div><span className="font-extrabold text-slate-800 tracking-tight">IB Core</span><span className="text-xs text-slate-400 bg-slate-100 px-2.5 py-1 rounded-full font-medium ml-1">IB Coordinator — Read Only</span></div>
      <button onClick={onLogout} className="text-sm text-slate-500 hover:text-slate-700 font-medium">Log out</button>
    </header>
    <div className="flex-1 overflow-auto p-6">
      <div className="flex gap-1 p-1 bg-slate-100 rounded-xl mb-6 w-fit">{['tok','cas','ee'].map(t=><button key={t} onClick={()=>setTab(t)} className={`px-5 py-2 text-sm font-bold rounded-lg transition-all uppercase tracking-wide ${tab===t?'bg-white shadow text-indigo-600':'text-slate-500 hover:text-slate-700'}`}>{t}</button>)}</div>
      <div className="bg-white rounded-2xl border border-slate-100 shadow-sm overflow-x-auto">
        {tab==='tok'&&<table className="w-full text-sm min-w-max border-collapse">
          <thead>
            <tr className="border-b border-slate-200">
              <th className="text-left px-4 py-3 font-bold text-slate-500 text-xs uppercase tracking-wide border-r-2 border-slate-300">Student</th>
              <th colSpan={3} className="px-3 py-2 text-xs font-extrabold text-violet-600 bg-violet-50 text-center border-r-2 border-slate-300">Exhibition</th>
              <th colSpan={5} className="px-3 py-2 text-xs font-extrabold text-violet-600 bg-violet-50 text-center">Essay</th>
            </tr>
            <tr className="border-b border-slate-200">
              <th className="text-left px-4 py-3 font-bold text-slate-500 text-xs uppercase tracking-wide border-r-2 border-slate-300">Name</th>
              <th className={thM}>Plan.Conf</th><th className={thM}>Written FB</th><th className={thB}>Score</th>
              <th className={thM}>Int 1</th><th className={thM}>Int 2</th><th className={thM}>Int 3</th><th className={thM}>Draft Sub</th><th className={thM}>Essay Score</th>
            </tr>
          </thead>
          <tbody>{students.map(s=>{const t=getTOK(s.student_id);const od=t.overdue||{};return<tr key={s.student_id} className="border-b border-slate-50 hover:bg-slate-50">
            <td className="px-4 py-3 border-r-2 border-slate-300"><div className="font-semibold text-slate-800">{s.name}</div><div className="text-xs text-slate-400">{s.student_id}</div></td>
            <td className={td(!t.exhibition_planning_conference&&od.exhibition_planning_conference)}><Tick v={t.exhibition_planning_conference} od={od.exhibition_planning_conference}/></td>
            <td className={td(!t.exhibition_written_feedback&&od.exhibition_written_feedback)}><Tick v={t.exhibition_written_feedback} od={od.exhibition_written_feedback}/></td>
            <td className={tdB()}><span className="font-bold text-indigo-600 text-xs">{t.exhibition_score||'—'}</span></td>
            <td className={td(!t.essay_interaction_1&&od.essay_interaction_1)}><Tick v={t.essay_interaction_1} od={od.essay_interaction_1}/></td>
            <td className={td(!t.essay_interaction_2&&od.essay_interaction_2)}><Tick v={t.essay_interaction_2} od={od.essay_interaction_2}/></td>
            <td className={td(!t.essay_interaction_3&&od.essay_interaction_3)}><Tick v={t.essay_interaction_3} od={od.essay_interaction_3}/></td>
            <td className={td(!t.essay_final_draft_submitted&&od.essay_final_draft_submitted)}><Tick v={t.essay_final_draft_submitted} od={od.essay_final_draft_submitted}/></td>
            <td className={td()}><span className="font-bold text-indigo-600 text-xs">{t.essay_score||'—'}</span></td>
          </tr>;})}
          </tbody>
        </table>}
        {tab==='cas'&&<table className="w-full text-sm min-w-max border-collapse">
          <thead>
            <tr className="border-b border-slate-200">
              <th className="text-left px-4 py-3 font-bold text-slate-500 text-xs uppercase tracking-wide border-r-2 border-slate-300">Student</th>
              <th colSpan={3} className="px-3 py-2 text-xs font-extrabold text-sky-600 bg-sky-50 text-center border-r-2 border-slate-300">Interviews</th>
              <th colSpan={2} className="px-3 py-2 text-xs font-extrabold text-sky-600 bg-sky-50 text-center border-r-2 border-slate-300">Project</th>
              <th colSpan={1} className="px-3 py-2 text-xs font-extrabold text-sky-600 bg-sky-50 text-center border-r-2 border-slate-300">Strands</th>
              <th colSpan={1} className="px-3 py-2 text-xs font-extrabold text-sky-600 bg-sky-50 text-center">Outcomes</th>
            </tr>
            <tr className="border-b border-slate-200">
              <th className="text-left px-4 py-3 font-bold text-slate-500 text-xs uppercase tracking-wide border-r-2 border-slate-300">Name</th>
              <th className={thM}>Int 1</th><th className={thM}>Int 2</th><th className={thB}>Final</th>
              <th className={thM}>Decided</th><th className={thB}>Complete</th>
              <th className={thB}>C / A / S</th>
              <th className={thM}>Met</th>
            </tr>
          </thead>
          <tbody>{students.map(s=>{const c=getCAS(s.student_id);const od=c.overdue||{};const strands=[c.strand_creativity&&'C',c.strand_activity&&'A',c.strand_service&&'S'].filter(Boolean);const outcomes=[1,2,3,4,5,6,7].filter(i=>c[`outcome_${i}`]).length;return<tr key={s.student_id} className="border-b border-slate-50 hover:bg-slate-50">
            <td className="px-4 py-3 border-r-2 border-slate-300"><div className="font-semibold text-slate-800">{s.name}</div><div className="text-xs text-slate-400">{s.student_id}</div></td>
            <td className={td()}><span className="text-xs text-slate-500">{c.interview_1_date||'—'}</span></td>
            <td className={td()}><span className="text-xs text-slate-500">{c.interview_2_date||'—'}</span></td>
            <td className={tdB()}><span className="text-xs text-slate-500">{c.interview_final_date||'—'}</span></td>
            <td className={td(!c.cas_project_decided&&od.cas_project_decided)}><Tick v={c.cas_project_decided} od={od.cas_project_decided}/></td>
            <td className={tdB(!c.cas_project_complete&&od.cas_project_complete)}><Tick v={c.cas_project_complete} od={od.cas_project_complete}/></td>
            <td className={tdB()}><span className="text-xs font-bold text-slate-700">{strands.length?strands.join(' · '):'—'}</span></td>
            <td className={td()}><span className={`text-xs font-bold px-2 py-0.5 rounded-full ${outcomes===7?'bg-emerald-100 text-emerald-700':outcomes>0?'bg-amber-100 text-amber-700':'bg-slate-100 text-slate-400'}`}>{outcomes}/7</span></td>
          </tr>;})}
          </tbody>
        </table>}
        {tab==='ee'&&<table className="w-full text-sm min-w-max border-collapse">
          <thead>
            <tr className="border-b border-slate-200">
              <th className="text-left px-4 py-3 font-bold text-slate-500 text-xs uppercase tracking-wide border-r-2 border-slate-300">Student</th>
              <th colSpan={2} className="px-3 py-2 text-xs font-extrabold text-teal-600 bg-teal-50 text-center border-r-2 border-slate-300">Details</th>
              <th colSpan={3} className="px-3 py-2 text-xs font-extrabold text-teal-600 bg-teal-50 text-center border-r-2 border-slate-300">Progress</th>
              <th colSpan={3} className="px-3 py-2 text-xs font-extrabold text-teal-600 bg-teal-50 text-center border-r-2 border-slate-300">Supervisor Interactions</th>
              <th colSpan={3} className="px-3 py-2 text-xs font-extrabold text-teal-600 bg-teal-50 text-center border-r-2 border-slate-300">Reflections</th>
              <th colSpan={3} className="px-3 py-2 text-xs font-extrabold text-teal-600 bg-teal-50 text-center">Extra</th>
            </tr>
            <tr className="border-b border-slate-200">
              <th className="text-left px-4 py-3 font-bold text-slate-500 text-xs uppercase tracking-wide border-r-2 border-slate-300">Name</th>
              <th className={thM}>Subject</th><th className={thB}>RQ</th>
              <th className={thM}>Bib</th><th className={thM}>Draft</th><th className={thB}>Final</th>
              <th className={thM}>Int1</th><th className={thM}>Int2</th><th className={thB}>Int3</th>
              <th className={thM}>Ref1</th><th className={thM}>Ref2</th><th className={thB}>Final</th>
              <th className={thM}>Sup✓</th><th className={thM}>Hrs</th><th className={thM}>Score</th>
            </tr>
          </thead>
          <tbody>{students.map(s=>{const e=getEE(s.student_id);const od=e.overdue||{};return<tr key={s.student_id} className="border-b border-slate-50 hover:bg-slate-50">
            <td className="px-4 py-3 border-r-2 border-slate-300"><div className="font-semibold text-slate-800">{s.name}</div><div className="text-xs text-slate-400">{s.student_id}</div></td>
            <td className={td()}><span className="text-xs text-slate-600">{e.ee_subject||'—'}</span></td>
            <td className={tdB()}><span className="text-xs text-slate-500 max-w-xs block truncate">{e.ee_rq||'—'}</span></td>
            <td className={td(!e.annotated_bibliography&&od.annotated_bibliography)}><Tick v={e.annotated_bibliography} od={od.annotated_bibliography}/></td>
            <td className={td(!e.draft_submitted&&od.draft_submitted)}><Tick v={e.draft_submitted} od={od.draft_submitted}/></td>
            <td className={tdB(!e.final_draft_submitted&&od.final_draft_submitted)}><Tick v={e.final_draft_submitted} od={od.final_draft_submitted}/></td>
            <td className={td(!e.supervisor_interaction_1&&od.supervisor_interaction_1)}><Tick v={e.supervisor_interaction_1} od={od.supervisor_interaction_1}/></td>
            <td className={td(!e.supervisor_interaction_2&&od.supervisor_interaction_2)}><Tick v={e.supervisor_interaction_2} od={od.supervisor_interaction_2}/></td>
            <td className={tdB(!e.supervisor_interaction_3&&od.supervisor_interaction_3)}><Tick v={e.supervisor_interaction_3} od={od.supervisor_interaction_3}/></td>
            <td className={td(!e.reflection_1&&od.reflection_1)}><Tick v={e.reflection_1} od={od.reflection_1}/></td>
            <td className={td(!e.reflection_2&&od.reflection_2)}><Tick v={e.reflection_2} od={od.reflection_2}/></td>
            <td className={tdB(!e.reflection_3_final&&od.reflection_3_final)}><Tick v={e.reflection_3_final} od={od.reflection_3_final}/></td>
            <td className={td(!e.supervisor_comments_complete&&od.supervisor_comments_complete)}><Tick v={e.supervisor_comments_complete} od={od.supervisor_comments_complete}/></td>
            <td className={td()}><span className="text-xs font-semibold text-slate-600">{e.hours||'—'}</span></td>
            <td className={td()}><span className="text-xs font-bold text-indigo-600">{e.score||'—'}</span></td>
          </tr>;})}
          </tbody>
        </table>}
      </div>
      <div className="mt-3 flex items-center gap-4 text-xs text-slate-400">
        <span className="flex items-center gap-1.5"><span className="inline-flex w-4 h-4 rounded-full bg-emerald-100 text-emerald-600 items-center justify-center text-xs">✓</span>Complete</span>
        <span className="flex items-center gap-1.5"><span className="inline-flex w-4 h-4 rounded-full bg-rose-100 text-rose-600 items-center justify-center text-xs font-bold">!</span>Overdue</span>
        <span className="flex items-center gap-1.5"><span className="inline-flex w-4 h-4 rounded-full bg-slate-100 text-slate-300 items-center justify-center text-xs">–</span>Pending</span>
      </div>
    </div>
    <ErrorBanner msg={error} onDismiss={onDismissError}/>
  </div>;
}

// ── STUDENT DASHBOARD ─────────────────────────────────────────
function StudentDashboard({student,tok,cas,ee,onLogout}){
  const [tab,setTab]=useState('tok');
  if(!student)return null;

  const tod=tok?.overdue||{};
  const eod=ee?.overdue||{};
  const cod=cas?.overdue||{};
  const outDone=cas?[1,2,3,4,5,6,7].filter(i=>cas[`outcome_${i}`]).length:0;
  const eeProg=ee?[ee.annotated_bibliography,ee.draft_submitted,ee.final_draft_submitted].filter(Boolean).length:0;
  const exDone=tok?[tok.exhibition_planning_conference,tok.exhibition_written_feedback,tok.exhibition_final_draft_in].filter(Boolean).length:0;
  const essDone=tok?[tok.essay_interaction_1,tok.essay_interaction_2,tok.essay_interaction_3,tok.essay_final_draft_submitted].filter(Boolean).length:0;

  return <div className="min-h-screen bg-slate-50">
    <header className="bg-white border-b border-slate-100 px-4 sm:px-6 py-3 flex items-center justify-between sticky top-0 z-10">
      <div className="flex items-center gap-2"><div className="w-8 h-8 rounded-lg bg-indigo-600 flex items-center justify-center"><svg className="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.746 0 3.332.477 4.5 1.253v13C19.832 18.477 18.246 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"/></svg></div><div><span className="font-extrabold text-slate-800 tracking-tight text-sm">IB Core</span><span className="block text-xs text-slate-400 leading-none mt-0.5">{student.name}</span></div></div>
      <button onClick={onLogout} className="text-sm text-slate-500 hover:text-slate-700 font-medium">Log out</button>
    </header>

    <div className="max-w-2xl mx-auto">
      {/* Tab Nav */}
      <div className="flex gap-1 p-1 bg-slate-100 rounded-xl my-4 mx-4 sm:mx-6 w-fit">
        {[['tok','TOK'],['cas','CAS'],['ee','EE']].map(([v,l])=><button key={v} onClick={()=>setTab(v)} className={`px-5 py-2 text-sm font-bold rounded-lg transition-all uppercase tracking-wide ${tab===v?'bg-white shadow text-indigo-600':'text-slate-500 hover:text-slate-700'}`}>{l}</button>)}
      </div>

      <div className="px-4 sm:px-6 pb-8 space-y-4 fade-in">

        {/* ── TOK ── */}
        {tab==='tok'&&<>
          <Card className="overflow-hidden">
            <div className="px-5 pt-5 pb-4 border-b border-slate-50 flex items-center justify-between"><div><h2 className="font-extrabold text-slate-800 text-lg">TOK Exhibition</h2></div><PBadge done={exDone} total={3}/></div>
            <div className="p-5 space-y-1">
              {tok?<>
                <StatusRow label="Planning Conference" done={tok.exhibition_planning_conference} overdue={!!tod.exhibition_planning_conference}/>
                <StatusRow label="Written Feedback" done={tok.exhibition_written_feedback} overdue={!!tod.exhibition_written_feedback}/>
                <StatusRow label="Final Draft In" done={tok.exhibition_final_draft_in} overdue={!!tod.exhibition_final_draft_in}/>
                {(tok.exhibition_score!==''&&tok.exhibition_score!==undefined)&&<div className="mt-3 pt-3 border-t border-slate-50 flex items-center gap-2"><span className="text-xs font-bold text-slate-400 uppercase tracking-wide">Score:</span><span className="text-sm font-bold text-indigo-600">{tok.exhibition_score}</span></div>}
                {tok.exhibition_comment&&<div className="mt-3 p-3 bg-indigo-50 rounded-xl"><p className="text-xs font-bold text-indigo-400 uppercase tracking-wide mb-1.5">Teacher Comment</p><p className="text-sm text-slate-700 leading-relaxed">{tok.exhibition_comment}</p></div>}
              </>:<p className="text-slate-400 text-sm">No data yet.</p>}
            </div>
          </Card>
          <Card className="overflow-hidden">
            <div className="px-5 pt-5 pb-4 border-b border-slate-50 flex items-center justify-between"><div><h2 className="font-extrabold text-slate-800 text-lg">TOK Essay</h2></div><PBadge done={essDone} total={4}/></div>
            <div className="p-5 space-y-1">
              {tok?<>
                {[1,2,3].map(n=>{
                  const ck=`essay_interaction_${n}`;
                  const nk=`essay_interaction_${n}_comment`;
                  return <div key={n} className="space-y-1">
                    <StatusRow label={`Interaction ${n}`} done={tok[ck]} overdue={!!tod[ck]}/>
                    {tok[nk]&&<div className="ml-8 mb-2 p-2.5 bg-slate-50 rounded-lg text-xs text-slate-600 leading-relaxed">{tok[nk]}</div>}
                  </div>;
                })}
                <StatusRow label="Final Draft Submitted" done={tok.essay_final_draft_submitted} overdue={!!tod.essay_final_draft_submitted}/>
                {(tok.essay_score!==''&&tok.essay_score!==undefined)&&<div className="mt-3 pt-3 border-t border-slate-50 flex items-center gap-2"><span className="text-xs font-bold text-slate-400 uppercase tracking-wide">Score:</span><span className="text-sm font-bold text-indigo-600">{tok.essay_score}</span></div>}
                {tok.essay_comment&&<div className="mt-3 p-3 bg-indigo-50 rounded-xl"><p className="text-xs font-bold text-indigo-400 uppercase tracking-wide mb-1.5">Teacher Comment</p><p className="text-sm text-slate-700 leading-relaxed">{tok.essay_comment}</p></div>}
              </>:<p className="text-slate-400 text-sm">No data yet.</p>}
            </div>
          </Card>
        </>}

        {/* ── CAS ── */}
        {tab==='cas'&&<>
          <Card className="overflow-hidden">
            <div className="px-5 pt-5 pb-4 border-b border-slate-50 flex items-center justify-between"><div><h2 className="font-extrabold text-slate-800 text-lg">CAS Interviews</h2></div></div>
            <div className="p-5 space-y-3">
              {cas?<>
                {[['First Interview','interview_1_date','interview_1_comment'],['Second Interview','interview_2_date','interview_2_comment'],['Final Interview','interview_final_date','interview_final_comment']].map(([label,dk,ck])=><div key={label} className={`border rounded-xl p-3 ${cas[dk]||cas[ck]?'border-slate-100':'border-dashed border-slate-100'}`}>
                  <div className="flex items-center justify-between mb-1"><span className="text-sm font-bold text-slate-700">{label}</span>{cas[dk]&&<span className="text-xs text-slate-400 bg-slate-100 px-2 py-0.5 rounded-full">{cas[dk]}</span>}</div>
                  {cas[ck]?<p className="text-sm text-slate-600 leading-relaxed">{cas[ck]}</p>:<span className="text-sm text-slate-300">Not yet scheduled</span>}
                </div>)}
                {cas.extra_interactions?.map((ex,i)=><div key={i} className="border border-slate-100 rounded-xl p-3">
                  <div className="flex items-center justify-between mb-1"><span className="text-sm font-bold text-slate-700">Extra Interaction {i+1}</span>{ex.date&&<span className="text-xs text-slate-400 bg-slate-100 px-2 py-0.5 rounded-full">{ex.date}</span>}</div>
                  {ex.comment&&<p className="text-sm text-slate-600 leading-relaxed">{ex.comment}</p>}
                </div>)}
              </>:<p className="text-slate-400 text-sm">No CAS data yet.</p>}
            </div>
          </Card>
          <Card className="overflow-hidden">
            <div className="px-5 pt-5 pb-4 border-b border-slate-50"><h2 className="font-extrabold text-slate-800 text-lg">CAS Project &amp; Strands</h2></div>
            <div className="p-5">
              {cas?<>
                <div className="space-y-1 mb-4">
                  <StatusRow label="Project Decided" done={cas.cas_project_decided} overdue={!!cod.cas_project_decided}/>
                  <StatusRow label="Project Complete" done={cas.cas_project_complete} overdue={!!cod.cas_project_complete}/>
                </div>
                <div className="flex gap-2 flex-wrap border-t border-slate-50 pt-4">
                  {[['Creativity',cas.strand_creativity],['Activity',cas.strand_activity],['Service',cas.strand_service]].map(([l,on])=><span key={l} className={`text-xs font-bold px-3 py-1.5 rounded-full border ${on?'bg-indigo-50 border-indigo-200 text-indigo-700':'bg-slate-50 border-slate-200 text-slate-400'}`}>{l}</span>)}
                </div>
              </>:<p className="text-slate-400 text-sm">No data yet.</p>}
            </div>
          </Card>
          <Card className="overflow-hidden">
            <div className="px-5 pt-5 pb-4 border-b border-slate-50 flex items-center justify-between"><h2 className="font-extrabold text-slate-800 text-lg">CAS Outcomes</h2><PBadge done={outDone} total={7}/></div>
            <div className="p-5 space-y-1">
              {cas?OUTCOMES.map((label,i)=><StatusRow key={i} label={label} done={cas[`outcome_${i+1}`]}/>):<p className="text-slate-400 text-sm">No data yet.</p>}
            </div>
          </Card>
        </>}

        {/* ── EE ── */}
        {tab==='ee'&&<>
          {ee?.ee_rq&&<Card className="p-5"><p className="text-xs font-bold text-slate-400 uppercase tracking-wide mb-1.5">Research Question</p><p className="text-sm text-slate-700 leading-relaxed font-medium italic">{ee.ee_rq}</p></Card>}
          <Card className="overflow-hidden">
            <div className="px-5 pt-5 pb-4 border-b border-slate-50 flex items-center justify-between"><h2 className="font-extrabold text-slate-800 text-lg">EE Progress</h2><PBadge done={eeProg} total={3}/></div>
            <div className="p-5 space-y-1">
              {ee?<>
                <StatusRow label="Annotated Bibliography" done={ee.annotated_bibliography} overdue={!!eod.annotated_bibliography}/>
                <StatusRow label="Draft Submitted" done={ee.draft_submitted} overdue={!!eod.draft_submitted}/>
                <StatusRow label="Final Draft Submitted" done={ee.final_draft_submitted} overdue={!!eod.final_draft_submitted}/>
              </>:<p className="text-slate-400 text-sm">No EE data yet.</p>}
            </div>
          </Card>
          <Card className="overflow-hidden">
            <div className="px-5 pt-5 pb-4 border-b border-slate-50"><h2 className="font-extrabold text-slate-800 text-lg">Supervisor &amp; Reflections</h2></div>
            <div className="p-5">
              {ee?<>
                <p className="text-xs font-bold text-slate-400 uppercase tracking-wide mb-2">Supervisor Interactions</p>
                <div className="space-y-1 mb-4">
                  <StatusRow label="Interaction 1" done={ee.supervisor_interaction_1} overdue={!!eod.supervisor_interaction_1}/>
                  <StatusRow label="Interaction 2" done={ee.supervisor_interaction_2} overdue={!!eod.supervisor_interaction_2}/>
                  <StatusRow label="Interaction 3" done={ee.supervisor_interaction_3} overdue={!!eod.supervisor_interaction_3}/>
                </div>
                <p className="text-xs font-bold text-slate-400 uppercase tracking-wide mb-2 pt-3 border-t border-slate-50">Reflections</p>
                <div className="space-y-1 mb-4">
                  <StatusRow label="Reflection 1" done={ee.reflection_1} overdue={!!eod.reflection_1}/>
                  <StatusRow label="Reflection 2" done={ee.reflection_2} overdue={!!eod.reflection_2}/>
                  <StatusRow label="Final Reflection" done={ee.reflection_3_final} overdue={!!eod.reflection_3_final}/>
                </div>
                <div className="pt-3 border-t border-slate-50 space-y-1">
                  <StatusRow label="Supervisor Comments Complete" done={ee.supervisor_comments_complete} overdue={!!eod.supervisor_comments_complete}/>
                  {ee.hours&&<div className="flex items-center gap-2 mt-2 ml-8"><span className="text-xs font-bold text-slate-400 uppercase tracking-wide">Hours:</span><span className="text-sm font-bold text-slate-700">{ee.hours}</span></div>}
                  {ee.score&&<div className="flex items-center gap-2 ml-8"><span className="text-xs font-bold text-slate-400 uppercase tracking-wide">Score:</span><span className="text-sm font-bold text-indigo-600">{ee.score}</span></div>}
                </div>
              </>:<p className="text-slate-400 text-sm">No EE data yet.</p>}
            </div>
          </Card>
        </>}

      </div>
    </div>
  </div>;
}

// ── APP ROOT ──────────────────────────────────────────────────
function App(){
  const [session,setSession]=useState(()=>{try{return JSON.parse(localStorage.getItem('ib_session')||'null');}catch{return null;}});
  const [students,setStudents]=useState([]);
  const [tokData,setTokData]=useState([]);
  const [casData,setCasData]=useState([]);
  const [eeData,setEeData]=useState([]);
  const [loading,setLoading]=useState(false);
  const [error,setError]=useState('');
  const [saveStatus,setSaveStatus]=useState('');
  const saveTimer=useRef(null);
  const showSaved=()=>{setSaveStatus('saving');clearTimeout(saveTimer.current);saveTimer.current=setTimeout(()=>setSaveStatus('saved'),700);setTimeout(()=>setSaveStatus(''),3000);};

  const loadData=useCallback(async()=>{
    setLoading(true);
    try{
      // Updated ranges to include new columns
      const [sRows,tRows,cRows,eRows]=await Promise.all([
        sheetsGet('Students!A:E'),
        sheetsGet('TOK!A:P'),   // extended from N to P
        sheetsGet('CAS!A:U'),   // extended from T to U
        sheetsGet('EE!A:P'),    // extended from O to P
      ]);
      setStudents(parseStudents(sRows));setTokData(parseTOK(tRows));setCasData(parseCAS(cRows));setEeData(parseEE(eRows));
    }catch(err){setError(err.message||'Failed to load data.');}
    setLoading(false);
  },[]);

  useEffect(()=>{if(session)loadData();},[session]);

  const handleLogin=sess=>{localStorage.setItem('ib_session',JSON.stringify(sess));setSession(sess);};
  const handleLogout=()=>{localStorage.removeItem('ib_session');setSession(null);setStudents([]);setTokData([]);setCasData([]);setEeData([]);};

  const handleUpdate=useCallback(async(type,newData,rowIdx,persist=false)=>{
    if(type==='tok'){setTokData(prev=>prev.map((t,i)=>i===rowIdx?newData:t));if(persist){showSaved();try{await saveTOK(newData,rowIdx);}catch(e){setError(e.message);}}}
    else if(type==='cas'){setCasData(prev=>prev.map((c,i)=>i===rowIdx?newData:c));if(persist){showSaved();try{await saveCAS(newData,rowIdx);}catch(e){setError(e.message);}}}
    else if(type==='ee'){setEeData(prev=>prev.map((e,i)=>i===rowIdx?newData:e));if(persist){showSaved();try{await saveEE(newData,rowIdx);}catch(e){setError(e.message);}}}
  },[]);

  const handleAddStudent=useCallback(async(form)=>{
    // Updated blank rows to include new columns
    const blankTOK=[form.student_id,'FALSE','FALSE','FALSE','','','FALSE','FALSE','FALSE','FALSE','','','','','','{}'];
    const blankCAS=[form.student_id,'','','','','','','[]','FALSE','FALSE','FALSE','FALSE','FALSE','FALSE','FALSE','FALSE','FALSE','FALSE','FALSE','FALSE','{}'];
    const blankEE =[form.student_id,'','','FALSE','FALSE','FALSE','FALSE','FALSE','FALSE','FALSE','FALSE','FALSE','FALSE','','','{}'];
    const blankStu=[form.student_id,form.name,form.password||'','',''];
    await sheetsAppend('Students!A:E',[blankStu]);
    await sheetsAppend('TOK!A:P',[blankTOK]);
    await sheetsAppend('CAS!A:U',[blankCAS]);
    await sheetsAppend('EE!A:P',[blankEE]);
    setStudents(prev=>[...prev,{student_id:form.student_id,name:form.name,password:form.password,ee_subject:'',ee_rq:''}]);
    setTokData(prev=>[...prev,parseTOK([['hdr'],blankTOK])[0]]);
    setCasData(prev=>[...prev,parseCAS([['hdr'],blankCAS])[0]]);
    setEeData(prev=>[...prev,parseEE([['hdr'],blankEE])[0]]);
  },[]);

  if(!session)return <LoginScreen onLogin={handleLogin}/>;
  if(loading)return <div className="min-h-screen flex flex-col items-center justify-center bg-slate-50 gap-4"><Spinner size="lg"/><p className="text-slate-500 font-medium">Loading student data…</p></div>;
  if(session.role==='admin')return <AdminDashboard students={students} tokData={tokData} casData={casData} eeData={eeData} onLogout={handleLogout} error={error} onDismissError={()=>setError('')}/>;
  if(session.role==='student'){const tok=tokData.find(t=>t.student_id===session.student_id);const cas=casData.find(c=>c.student_id===session.student_id);const ee=eeData.find(e=>e.student_id===session.student_id);const stu=students.find(s=>s.student_id===session.student_id);return <StudentDashboard student={stu||session} tok={tok} cas={cas} ee={ee} onLogout={handleLogout}/>;}
  return <TeacherDashboard students={students} tokData={tokData} casData={casData} eeData={eeData} onUpdate={handleUpdate} onAddStudent={handleAddStudent} onLogout={handleLogout} saveStatus={saveStatus} error={error} onDismissError={()=>setError('')}/>;
}

const root=ReactDOM.createRoot(document.getElementById('root'));
root.render(<App/>);
</script>
</body>
</html>
