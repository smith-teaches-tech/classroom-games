// ── GOOGLE AUTH ─────────────────────────────────────────────
let _token = null, _tokenExp = 0;
function b64url(str) {
  return btoa(unescape(encodeURIComponent(str))).replace(/\+/g,'-').replace(/\//g,'_').replace(/=/g,'');
}
function bytesToB64url(buf) {
  let s=''; new Uint8Array(buf).forEach(b=>s+=String.fromCharCode(b));
  return btoa(s).replace(/\+/g,'-').replace(/\//g,'_').replace(/=/g,'');
}
async function getToken() {
  if (_token && Date.now() < _tokenExp-60000) return _token;
  const now=Math.floor(Date.now()/1000);
  const hdr=b64url(JSON.stringify({alg:'RS256',typ:'JWT'}));
  const pay=b64url(JSON.stringify({iss:CLIENT_EMAIL,scope:'https://www.googleapis.com/auth/spreadsheets',aud:'https://oauth2.googleapis.com/token',iat:now,exp:now+3600}));
  const si=`${hdr}.${pay}`;
  const pem=PRIVATE_KEY_B64.replace(/\s/g,'');
  const der=atob(pem); const db=new Uint8Array(der.length);
  for(let i=0;i<der.length;i++) db[i]=der.charCodeAt(i);
  const key=await crypto.subtle.importKey('pkcs8',db.buffer,{name:'RSASSA-PKCS1-v1_5',hash:'SHA-256'},false,['sign']);
  const sig=await crypto.subtle.sign('RSASSA-PKCS1-v1_5',key,new TextEncoder().encode(si));
  const jwt=`${si}.${bytesToB64url(sig)}`;
  const res=await fetch('https://oauth2.googleapis.com/token',{method:'POST',headers:{'Content-Type':'application/x-www-form-urlencoded'},body:`grant_type=urn%3Aietf%3Aparams%3Aoauth%3Agrant-type%3Ajwt-bearer&assertion=${jwt}`});
  const d=await res.json();
  if (!d.access_token) throw new Error(d.error_description||'Token fetch failed');
  _token=d.access_token; _tokenExp=Date.now()+d.expires_in*1000;
  return _token;
}

// ── SHEETS API ──────────────────────────────────────────────
const SBASE=`https://sheets.googleapis.com/v4/spreadsheets/${SPREADSHEET_ID}`;
async function sheetsGet(range) {
  const tok=await getToken();
  const r=await fetch(`${SBASE}/values/${encodeURIComponent(range)}`,{headers:{Authorization:`Bearer ${tok}`}});
  const d=await r.json(); if(!r.ok) throw new Error(d.error?.message||'Read error');
  return d.values||[];
}
async function sheetsPut(range,values) {
  const tok=await getToken();
  const r=await fetch(`${SBASE}/values/${encodeURIComponent(range)}?valueInputOption=RAW`,{method:'PUT',headers:{Authorization:`Bearer ${tok}`,'Content-Type':'application/json'},body:JSON.stringify({range,majorDimension:'ROWS',values})});
  const d=await r.json(); if(!r.ok) throw new Error(d.error?.message||'Write error');
  return d;
}
async function sheetsAppend(range,values) {
  const tok=await getToken();
  const r=await fetch(`${SBASE}/values/${encodeURIComponent(range)}:append?valueInputOption=RAW&insertDataOption=INSERT_ROWS`,{method:'POST',headers:{Authorization:`Bearer ${tok}`,'Content-Type':'application/json'},body:JSON.stringify({range,majorDimension:'ROWS',values})});
  const d=await r.json(); if(!r.ok) throw new Error(d.error?.message||'Append error');
  return d;
}

function CopyBtn({text}){const[c,setC]=useState(false);const go=()=>{navigator.clipboard.writeText(text||'').then(()=>{setC(true);setTimeout(()=>setC(false),2000);}).catch(()=>{});};return <button onClick={go} className="flex items-center gap-1 text-xs font-medium text-slate-400 hover:text-indigo-600 px-2 py-1 rounded hover:bg-indigo-50"><svg className="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><rect x="9" y="9" width="13" height="13" rx="2" strokeWidth="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1" strokeWidth="2"/></svg>{c?'Copied!':'Copy'}</button>;}

// ── LOGIN ───────────────────────────────────────────────────

async function hashPassword(plain) {
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(plain));
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
}
function LoginScreen({onLogin}){
  const [role,setRole]=useState('teacher');
  const [user,setUser]=useState('');
  const [pass,setPass]=useState('');
  const [loading,setLoading]=useState(false);
  const [error,setError]=useState('');
  const submit=async e=>{
    e.preventDefault();setError('');setLoading(true);
    try{
      const hashed=await hashPassword(pass);
      if(role==='teacher'){if(user===TEACHER_CREDS.username&&hashed===TEACHER_CREDS.password)onLogin({role:'teacher',name:'Teacher'});else setError('Incorrect credentials.');}
      else if(role==='admin'){if(user===ADMIN_CREDS.username&&hashed===ADMIN_CREDS.password)onLogin({role:'admin',name:'IB Coordinator'});else setError('Incorrect credentials.');}
      else{const rows=await sheetsGet('Students!A:E');const students=parseStudents(rows);const m=students.find(s=>(s.student_id===user||s.name.toLowerCase()===user.toLowerCase())&&s.password===pass);if(m)onLogin({role:'student',name:m.name,student_id:m.student_id});else setError('Student not found or wrong password.');}
    }catch(err){setError(err.message||'Login failed.');}
    setLoading(false);
  };
  
  return <div className="min-h-screen bg-gradient-to-br from-slate-900 via-indigo-950 to-slate-900 flex items-center justify-center p-4">
    <div className="w-full max-w-sm fade-in">
      <div className="text-center mb-8">
        <div className="inline-flex items-center justify-center w-16 h-16 rounded-2xl bg-indigo-500/20 border border-indigo-500/30 mb-4"><svg className="w-8 h-8 text-indigo-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="1.5" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.746 0 3.332.477 4.5 1.253v13C19.832 18.477 18.246 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"/></svg></div>
        <h1 className="text-2xl font-extrabold text-white tracking-tight">IB Core Dashboard</h1>
        <p className="text-slate-400 text-sm mt-1">Sign in to continue</p>
      </div>
      <div className="bg-white rounded-2xl shadow-2xl p-6">
        <form onSubmit={submit} className="space-y-4">
          <div className="grid grid-cols-3 gap-1 p-1 bg-slate-100 rounded-xl">
            {['teacher','admin','student'].map(r=><button key={r} type="button" onClick={()=>{setRole(r);setError('');}} className={`py-2 text-sm font-semibold rounded-lg transition-all capitalize ${role===r?'bg-white shadow-sm text-indigo-600':'text-slate-500 hover:text-slate-700'}`}>{r==='admin'?'Admin':r.charAt(0).toUpperCase()+r.slice(1)}</button>)}
          </div>
          <div><label className="block text-xs font-bold text-slate-500 uppercase tracking-wide mb-1.5">{role==='student'?'Student ID or Name':'Username'}</label><input type="text" value={user} onChange={e=>setUser(e.target.value)} required placeholder={role==='student'?'S001 or Full Name':''} className="w-full px-3.5 py-2.5 border border-slate-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500"/></div>
          <div><label className="block text-xs font-bold text-slate-500 uppercase tracking-wide mb-1.5">Password</label><input type="password" value={pass} onChange={e=>setPass(e.target.value)} required className="w-full px-3.5 py-2.5 border border-slate-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500"/></div>
          {error&&<div className="text-sm text-rose-600 bg-rose-50 border border-rose-100 rounded-xl px-3.5 py-2.5">{error}</div>}
          <button type="submit" disabled={loading} className="w-full py-2.5 bg-indigo-600 hover:bg-indigo-700 text-white font-bold rounded-xl flex items-center justify-center gap-2 disabled:opacity-60 text-sm">{loading?<><Spinner/>Signing in…</>:'Sign in'}</button>
        </form>
      </div>
    </div>
  </div>;
}

const OUTCOMES=['Identify own strengths and develop areas for growth','Demonstrate that challenges have been undertaken, developing new skills in the process','Demonstrate how to initiate and plan a CAS experience','Show commitment to and perseverance in their CAS experiences','Demonstrate the skills and recognise the benefits of working collaboratively','Demonstrate engagement with issues of global significance','Recognise and consider the ethics of choices and actions'];

function InterviewCard({label,date,comment,onDateChange,onCommentChange,onBlur,onDelete}){
  return <div className="border border-slate-100 rounded-xl p-4 space-y-3">
    <div className="flex items-center justify-between"><span className="text-sm font-bold text-slate-700">{label}</span>{onDelete&&<button onClick={onDelete} className="text-xs text-rose-400 hover:text-rose-600 font-medium">Remove</button>}</div>
    <div className="flex items-center gap-3"><label className="text-xs font-semibold text-slate-400 uppercase tracking-wide w-12">Date</label><input type="date" value={date} onChange={e=>onDateChange(e.target.value)} onBlur={onBlur} className="text-sm border border-slate-200 rounded-lg px-2.5 py-1.5 focus:outline-none focus:ring-2 focus:ring-indigo-400"/></div>
    <div><div className="flex items-center justify-between mb-1"><label className="text-xs font-semibold text-slate-400 uppercase tracking-wide">Comment</label><CopyBtn text={comment}/></div><Textarea value={comment} onChange={onCommentChange} onBlur={onBlur}/></div>
  </div>;
}

function CASTab({cas,onChange,onSave}){
  if(!cas)return <div className="text-slate-400 text-sm">No CAS data.</div>;
  const upd=(key,val)=>{const n={...cas,[key]:val};onChange(n);return n;};
  const updSave=(key,val)=>{const n={...cas,[key]:val};onChange(n);onSave(n);};
  const blur=()=>onSave(cas);
  const outDone=[1,2,3,4,5,6,7].filter(i=>cas[`outcome_${i}`]).length;
  const addExtra=()=>{const n={...cas,extra_interactions:[...cas.extra_interactions,{date:'',comment:''}]};onChange(n);onSave(n);};
  const updExtra=(i,key,val)=>{const extras=cas.extra_interactions.map((x,xi)=>xi===i?{...x,[key]:val}:x);const n={...cas,extra_interactions:extras};onChange(n);return n;};
  const delExtra=i=>{const extras=cas.extra_interactions.filter((_,xi)=>xi!==i);const n={...cas,extra_interactions:extras};onChange(n);onSave(n);};
  return <div className="space-y-5 fade-in">
    <Card className="p-5">
      <SectionTitle action={<button onClick={addExtra} className="flex items-center gap-1 text-xs font-bold text-indigo-600 hover:text-indigo-700"><span className="text-lg leading-none">+</span> Add Interaction</button>}>Interviews</SectionTitle>
      <div className="space-y-4">
        {[['First Interview','interview_1_date','interview_1_comment'],['Second Interview','interview_2_date','interview_2_comment'],['Final Interview','interview_final_date','interview_final_comment']].map(([label,dk,ck])=><InterviewCard key={label} label={label} date={cas[dk]} comment={cas[ck]} onDateChange={v=>upd(dk,v)} onCommentChange={v=>upd(ck,v)} onBlur={blur}/>)}
        {cas.extra_interactions.map((ex,i)=><InterviewCard key={i} label={`Extra Interaction ${i+1}`} date={ex.date} comment={ex.comment} onDateChange={v=>updExtra(i,'date',v)} onCommentChange={v=>updExtra(i,'comment',v)} onBlur={()=>onSave(cas)} onDelete={()=>delExtra(i)}/>)}
      </div>
    </Card>
    <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
      <Card className="p-5"><SectionTitle>CAS Project</SectionTitle><div className="space-y-3"><IBCheckbox label="Project Decided" checked={cas.cas_project_decided} onChange={v=>updSave('cas_project_decided',v)}/><IBCheckbox label="Project Complete" checked={cas.cas_project_complete} onChange={v=>updSave('cas_project_complete',v)}/></div></Card>
      <Card className="p-5"><SectionTitle>Strands</SectionTitle><div className="space-y-3"><IBCheckbox label="Creativity" checked={cas.strand_creativity} onChange={v=>updSave('strand_creativity',v)}/><IBCheckbox label="Activity" checked={cas.strand_activity} onChange={v=>updSave('strand_activity',v)}/><IBCheckbox label="Service" checked={cas.strand_service} onChange={v=>updSave('strand_service',v)}/></div></Card>
    </div>
    <Card className="p-5"><SectionTitle action={<PBadge done={outDone} total={7}/>}>CAS Outcomes</SectionTitle><div className="space-y-3">{OUTCOMES.map((label,i)=><IBCheckbox key={i} label={label} checked={cas[`outcome_${i+1}`]} onChange={v=>updSave(`outcome_${i+1}`,v)}/>)}</div></Card>
  </div>;
}

        <span className="flex items-center gap-1.5"><span className="inline-block w-3 h-3 rounded-full bg-emerald-400"/>Done</span>

                  <td className={tdCl}><Dot on={c.strand_activity}/></td>

                  <td className={tdCl}><Dot on={e.annotated_bibliography}/></td>

                  <td className={tdCl}><Dot on={e.supervisor_interaction_1}/></td>
                  <td className={tdCl}><Dot on={e.supervisor_interaction_2}/></td>

                  <td className={tdCl}><Dot on={e.reflection_1}/></td>

                </>}
              </tr>;

        </table>
        {filtered.length===0&&<div className="py-16 text-center text-slate-400 text-sm">No students match</div>}
      </div>
      <p className="text-xs text-slate-400 mt-3 text-center">{filtered.length} of {students.length} students · ⬆ MB = comment ready to copy to Managebac</p>
    </div>

}

// ── ADD STUDENT MODAL ───────────────────────────────────────
function AddStudentModal({onClose,onAdd}){
  const [form,setForm]=useState({name:'',student_id:'',password:''});
  const [loading,setLoading]=useState(false);
  const [error,setError]=useState('');
  const f=key=>e=>setForm(p=>({...p,[key]:e.target.value}));
  const submit=async e=>{
    e.preventDefault();
    if(!form.student_id||!form.name){setError('Name and Student ID are required.');return;}
    setLoading(true);setError('');
    try{await onAdd(form);onClose();}catch(err){setError(err.message);}
    setLoading(false);
  };
  return <div className="fixed inset-0 bg-black/40 flex items-center justify-center p-4 z-50">
    <div className="bg-white rounded-2xl shadow-2xl w-full max-w-sm fade-in">
      <div className="flex items-center justify-between px-6 py-4 border-b border-slate-100"><h2 className="font-bold text-slate-800">Add Student</h2><button onClick={onClose} className="text-slate-400 hover:text-slate-600 text-2xl leading-none">×</button></div>
      <form onSubmit={submit} className="p-6 space-y-4">
        {[['Full Name','name',true],['Student ID','student_id',true],['Password','password',false]].map(([label,key,req])=><div key={key}><label className="block text-xs font-bold text-slate-500 uppercase tracking-wide mb-1.5">{label}{req&&' *'}</label><input type="text" value={form[key]} onChange={f(key)} required={req} className="w-full px-3.5 py-2.5 border border-slate-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400"/></div>)}
        <p className="text-xs text-slate-400">EE subject and RQ can be filled in from the EE tab after adding.</p>
        {error&&<div className="text-sm text-rose-600 bg-rose-50 border border-rose-100 rounded-xl px-3.5 py-2.5">{error}</div>}
        <div className="flex gap-3 pt-1">
          <button type="button" onClick={onClose} className="flex-1 py-2.5 border border-slate-200 text-slate-600 font-semibold rounded-xl hover:bg-slate-50 text-sm">Cancel</button>
          <button type="submit" disabled={loading} className="flex-1 py-2.5 bg-indigo-600 hover:bg-indigo-700 text-white font-bold rounded-xl text-sm flex items-center justify-center gap-2 disabled:opacity-60">{loading?<><Spinner/>Adding…</>:'Add Student'}</button>
        </div>
      </form>
    </div>
  </div>;
}

  const [mobileSidebar,setMobileSidebar]=useState(false);

  const selStudent=students.find(s=>s.student_id===selectedId);
  const selTOK=tokData.find(t=>t.student_id===selectedId);
  const selCAS=casData.find(c=>c.student_id===selectedId);
  const selEE =eeData.find(e=>e.student_id===selectedId);
  const tokIdx=tokData.findIndex(t=>t.student_id===selectedId);

        <div className="flex items-center gap-2"><div className="w-8 h-8 rounded-lg bg-indigo-600 flex items-center justify-center"><svg className="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.746 0 3.332.477 4.5 1.253v13C19.832 18.477 18.246 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"/></svg></div><span className="font-extrabold text-slate-800 tracking-tight">IB Core</span></div>

          <button onClick={()=>setView('overview')} className={`flex items-center gap-1.5 px-3 py-1.5 text-xs font-bold rounded-md transition-all ${view==='overview'?'bg-white shadow text-indigo-600':'text-slate-500 hover:text-slate-700'}`}><svg className="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M4 6h16M4 10h16M4 14h16M4 18h16"/></svg>Class Overview</button>
        </div>

    </header>

    {view==='overview'

      :<div className="flex flex-1 overflow-hidden">
        {/* Sidebar */}
        <aside className={`${mobileSidebar?'flex':'hidden'} sm:flex flex-col w-72 border-r border-slate-100 bg-white flex-shrink-0 absolute sm:relative inset-0 z-30 sm:z-auto`}>
          <div className="p-4 border-b border-slate-50">
            <div className="relative mb-3"><svg className="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg><input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Search students…" className="w-full pl-9 pr-3 py-2 text-sm border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-400 bg-slate-50"/></div>
            <button onClick={()=>setShowAdd(true)} className="w-full flex items-center justify-center gap-2 py-2 text-sm font-bold text-indigo-600 bg-indigo-50 hover:bg-indigo-100 rounded-xl transition-colors"><span className="text-lg leading-none">+</span> Add Student</button>

            {filtered.length===0&&<p className="text-sm text-slate-400 text-center py-8">No students found</p>}

              const tok_=tokData.find(t=>t.student_id===s.student_id)||{};
              const ee_=eeData.find(e=>e.student_id===s.student_id)||{};
              const exDone=[tok_.exhibition_planning_conference,tok_.exhibition_written_feedback,tok_.exhibition_final_draft_in].filter(Boolean).length;
              const eeDone=[ee_.annotated_bibliography,ee_.draft_submitted,ee_.final_draft_submitted].filter(Boolean).length;
              return <button key={s.student_id} onClick={()=>{setSelectedId(s.student_id);setMobileSidebar(false);}} className={`w-full text-left px-4 py-3.5 border-b border-slate-50 transition-all hover:bg-slate-50 ${selectedId===s.student_id?'bg-indigo-50 border-l-4 border-l-indigo-600':'border-l-4 border-l-transparent'}`}>
                <div className="font-semibold text-slate-800 text-sm">{s.name}</div>
                <div className="text-xs text-slate-400 mt-0.5 flex items-center gap-3"><span>{s.student_id}</span><span className="text-slate-300">·</span><span>TOK {exDone}/3</span><span className="text-slate-300">·</span><span>EE {eeDone}/3</span></div>
              </button>;
            })}
          </div>
          <div className="p-3 border-t border-slate-100"><p className="text-xs text-slate-400 text-center">{students.length} students</p></div>
        </aside>
        {/* Main */}
        <main className="flex-1 overflow-y-auto">
          {!selStudent
            ?<div className="flex flex-col items-center justify-center h-full text-center p-8">
              <div className="w-20 h-20 rounded-2xl bg-slate-100 flex items-center justify-center mb-4"><svg className="w-10 h-10 text-slate-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="1.5" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0z"/></svg></div>
              <h3 className="font-bold text-slate-700 text-lg">Select a student</h3>
              <p className="text-slate-400 text-sm mt-1">Or switch to Class Overview to see everyone at once</p>
            </div>
            :<div className="p-5 sm:p-6 max-w-3xl">
              <div className="mb-6"><h2 className="text-xl font-extrabold text-slate-800">{selStudent.name}</h2><p className="text-sm text-slate-400 mt-0.5">{selStudent.student_id} · {selStudent.ee_subject||'EE subject TBC'}</p></div>
              <div className="flex gap-1 p-1 bg-slate-100 rounded-xl mb-6 w-fit">
                {['tok','cas','ee'].map(t=><button key={t} onClick={()=>setTab(t)} className={`px-5 py-2 text-sm font-bold rounded-lg transition-all uppercase tracking-wide ${tab===t?'bg-white shadow text-indigo-600':'text-slate-500 hover:text-slate-700'}`}>{t}</button>)}
              </div>
              {tab==='tok'&&<TOKTab tok={selTOK} onChange={n=>onUpdate('tok',n,tokIdx,false)} onSave={n=>onUpdate('tok',n,tokIdx,true)}/>}
              {tab==='cas'&&<CASTab cas={selCAS} onChange={n=>onUpdate('cas',n,casIdx,false)} onSave={n=>onUpdate('cas',n,casIdx,true)}/>}
              {tab==='ee'&&<EETab ee={selEE} onChange={n=>onUpdate('ee',n,eeIdx,false)} onSave={n=>onUpdate('ee',n,eeIdx,true)}/>}
            </div>
          }
        </main>
      </div>
    }
    {showAdd&&<AddStudentModal onClose={()=>setShowAdd(false)} onAdd={onAddStudent}/>}
    <ErrorBanner msg={error} onDismiss={onDismissError}/>
  </div>;
}

// ── ADMIN DASHBOARD ─────────────────────────────────────────
function AdminDashboard({students,tokData,casData,eeData,onLogout,saveStatus,error,onDismissError}){

  const getTOK=id=>tokData.find(t=>t.student_id===id)||{};
  const getCAS=id=>casData.find(c=>c.student_id===id)||{};
  const getEE =id=>eeData.find(e=>e.student_id===id)||{};
  const Tick=({v})=>v?<span className="inline-flex items-center justify-center w-5 h-5 rounded-full bg-emerald-100 text-emerald-600 text-xs">✓</span>:<span className="inline-flex items-center justify-center w-5 h-5 rounded-full bg-slate-100 text-slate-300 text-xs">–</span>;

      <div className="flex items-center gap-3"><SaveBadge status={saveStatus}/><button onClick={onLogout} className="text-sm text-slate-500 hover:text-slate-700 font-medium">Log out</button></div>
    </header>
    <div className="flex-1 overflow-auto p-6">
      <div className="flex gap-1 p-1 bg-slate-100 rounded-xl mb-6 w-fit">{['tok','cas','ee'].map(t=><button key={t} onClick={()=>setTab(t)} className={`px-5 py-2 text-sm font-bold rounded-lg transition-all uppercase tracking-wide ${tab===t?'bg-white shadow text-indigo-600':'text-slate-500 hover:text-slate-700'}`}>{t}</button>)}</div>
      <div className="bg-white rounded-2xl border border-slate-100 shadow-sm overflow-x-auto">
        {tab==='tok'&&<table className="w-full text-sm min-w-max"><thead><tr className="border-b border-slate-100"><th className="text-left px-4 py-3 font-bold text-slate-500 text-xs uppercase tracking-wide">Student</th><th className="px-3 py-3 font-bold text-slate-500 text-xs uppercase tracking-wide">Plan.Conf</th><th className="px-3 py-3 font-bold text-slate-500 text-xs uppercase tracking-wide">Written FB</th><th className="px-3 py-3 font-bold text-slate-500 text-xs uppercase tracking-wide">Final Draft</th><th className="px-3 py-3 font-bold text-slate-500 text-xs uppercase tracking-wide">Exh Score</th><th className="px-3 py-3 font-bold text-slate-500 text-xs uppercase tracking-wide">Int 1</th><th className="px-3 py-3 font-bold text-slate-500 text-xs uppercase tracking-wide">Int 2</th><th className="px-3 py-3 font-bold text-slate-500 text-xs uppercase tracking-wide">Int 3</th><th className="px-3 py-3 font-bold text-slate-500 text-xs uppercase tracking-wide">Draft Sub</th><th className="px-3 py-3 font-bold text-slate-500 text-xs uppercase tracking-wide">Essay Score</th></tr></thead><tbody>{students.map(s=>{const t=getTOK(s.student_id);return<tr key={s.student_id} className="border-b border-slate-50 hover:bg-slate-50"><td className="px-4 py-3"><div className="font-semibold text-slate-800">{s.name}</div><div className="text-xs text-slate-400">{s.student_id}</div></td>{[t.exhibition_planning_conference,t.exhibition_written_feedback,t.exhibition_final_draft_in].map((v,i)=><td key={i} className="px-3 py-3 text-center"><Tick v={v}/></td>)}<td className="px-3 py-3 text-center font-bold text-indigo-600">{t.exhibition_score||'—'}</td>{[t.essay_interaction_1,t.essay_interaction_2,t.essay_interaction_3,t.essay_final_draft_submitted].map((v,i)=><td key={i} className="px-3 py-3 text-center"><Tick v={v}/></td>)}<td className="px-3 py-3 text-center font-bold text-indigo-600">{t.essay_score||'—'}</td></tr>;})}</tbody></table>}
        {tab==='cas'&&<table className="w-full text-sm min-w-max"><thead><tr className="border-b border-slate-100"><th className="text-left px-4 py-3 font-bold text-slate-500 text-xs uppercase tracking-wide">Student</th><th className="px-3 py-3 font-bold text-slate-500 text-xs uppercase tracking-wide">Int 1</th><th className="px-3 py-3 font-bold text-slate-500 text-xs uppercase tracking-wide">Int 2</th><th className="px-3 py-3 font-bold text-slate-500 text-xs uppercase tracking-wide">Final Int</th><th className="px-3 py-3 font-bold text-slate-500 text-xs uppercase tracking-wide">Project</th><th className="px-3 py-3 font-bold text-slate-500 text-xs uppercase tracking-wide">Strands</th><th className="px-3 py-3 font-bold text-slate-500 text-xs uppercase tracking-wide">Outcomes</th></tr></thead><tbody>{students.map(s=>{const c=getCAS(s.student_id);const strands=[c.strand_creativity&&'C',c.strand_activity&&'A',c.strand_service&&'S'].filter(Boolean);const outcomes=[1,2,3,4,5,6,7].filter(i=>c[`outcome_${i}`]).length;return<tr key={s.student_id} className="border-b border-slate-50 hover:bg-slate-50"><td className="px-4 py-3"><div className="font-semibold text-slate-800">{s.name}</div><div className="text-xs text-slate-400">{s.student_id}</div></td><td className="px-3 py-3 text-center text-xs text-slate-500">{c.interview_1_date||'—'}</td><td className="px-3 py-3 text-center text-xs text-slate-500">{c.interview_2_date||'—'}</td><td className="px-3 py-3 text-center text-xs text-slate-500">{c.interview_final_date||'—'}</td><td className="px-3 py-3 text-center"><span className={`text-xs font-semibold px-2 py-0.5 rounded-full ${c.cas_project_complete?'bg-emerald-100 text-emerald-700':c.cas_project_decided?'bg-amber-100 text-amber-700':'bg-slate-100 text-slate-400'}`}>{c.cas_project_complete?'Done':c.cas_project_decided?'Planned':'Not started'}</span></td><td className="px-3 py-3 text-center"><span className="text-xs font-bold text-slate-700">{strands.length?strands.join(' '):'—'}</span></td><td className="px-3 py-3 text-center"><span className={`text-xs font-bold px-2 py-0.5 rounded-full ${outcomes===7?'bg-emerald-100 text-emerald-700':outcomes>0?'bg-amber-100 text-amber-700':'bg-slate-100 text-slate-400'}`}>{outcomes}/7</span></td></tr>;})}</tbody></table>}
        {tab==='ee'&&<table className="w-full text-sm min-w-max"><thead><tr className="border-b border-slate-100"><th className="text-left px-4 py-3 font-bold text-slate-500 text-xs uppercase tracking-wide">Student</th><th className="text-left px-3 py-3 font-bold text-slate-500 text-xs uppercase tracking-wide">Subject</th><th className="text-left px-3 py-3 font-bold text-slate-500 text-xs uppercase tracking-wide">RQ</th><th className="px-3 py-3 font-bold text-slate-500 text-xs uppercase tracking-wide">Progress</th><th className="px-3 py-3 font-bold text-slate-500 text-xs uppercase tracking-wide">Sup Int</th><th className="px-3 py-3 font-bold text-slate-500 text-xs uppercase tracking-wide">Reflections</th><th className="px-3 py-3 font-bold text-slate-500 text-xs uppercase tracking-wide">Hours</th><th className="px-3 py-3 font-bold text-slate-500 text-xs uppercase tracking-wide">Score</th></tr></thead><tbody>{students.map(s=>{const e=getEE(s.student_id);const prog=[e.annotated_bibliography,e.draft_submitted,e.final_draft_submitted].filter(Boolean).length;const intD=[e.supervisor_interaction_1,e.supervisor_interaction_2,e.supervisor_interaction_3].filter(Boolean).length;const refD=[e.reflection_1,e.reflection_2,e.reflection_3_final].filter(Boolean).length;return<tr key={s.student_id} className="border-b border-slate-50 hover:bg-slate-50"><td className="px-4 py-3"><div className="font-semibold text-slate-800">{s.name}</div><div className="text-xs text-slate-400">{s.student_id}</div></td><td className="px-3 py-3 text-slate-600">{e.ee_subject||'—'}</td><td className="px-3 py-3 max-w-xs"><span className="text-xs text-slate-500 line-clamp-2">{e.ee_rq||'—'}</span></td><td className="px-3 py-3 text-center"><span className={`text-xs font-bold px-2 py-0.5 rounded-full ${prog===3?'bg-emerald-100 text-emerald-700':prog>0?'bg-amber-100 text-amber-700':'bg-slate-100 text-slate-400'}`}>{prog}/3</span></td><td className="px-3 py-3 text-center"><span className={`text-xs font-bold px-2 py-0.5 rounded-full ${intD===3?'bg-emerald-100 text-emerald-700':intD>0?'bg-amber-100 text-amber-700':'bg-slate-100 text-slate-400'}`}>{intD}/3</span></td><td className="px-3 py-3 text-center"><span className={`text-xs font-bold px-2 py-0.5 rounded-full ${refD===3?'bg-emerald-100 text-emerald-700':refD>0?'bg-amber-100 text-amber-700':'bg-slate-100 text-slate-400'}`}>{refD}/3</span></td><td className="px-3 py-3 text-center text-slate-600 font-semibold">{e.hours||'—'}</td><td className="px-3 py-3 text-center font-bold text-indigo-600">{e.score||'—'}</td></tr>;})}</tbody></table>}
      </div>
    </div>
    <ErrorBanner msg={error} onDismiss={onDismissError}/>
  </div>;
}

// ── STUDENT DASHBOARD ────────────────────────────────────────
function StudentDashboard({student,tok,cas,ee,onLogout}){
  if(!student)return null;
  const exDone=tok?[tok.exhibition_planning_conference,tok.exhibition_written_feedback,tok.exhibition_final_draft_in].filter(Boolean).length:0;
  const essDone=tok?[tok.essay_interaction_1,tok.essay_interaction_2,tok.essay_interaction_3,tok.essay_final_draft_submitted].filter(Boolean).length:0;
  const outDone=cas?[1,2,3,4,5,6,7].filter(i=>cas[`outcome_${i}`]).length:0;
  const eeProg=ee?[ee.annotated_bibliography,ee.draft_submitted,ee.final_draft_submitted].filter(Boolean).length:0;
  return <div className="min-h-screen bg-slate-50">
    <header className="bg-white border-b border-slate-100 px-4 sm:px-6 py-3 flex items-center justify-between sticky top-0 z-10">
      <div className="flex items-center gap-2"><div className="w-8 h-8 rounded-lg bg-indigo-600 flex items-center justify-center"><svg className="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.746 0 3.332.477 4.5 1.253v13C19.832 18.477 18.246 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"/></svg></div><div><span className="font-extrabold text-slate-800 tracking-tight text-sm">IB Core</span><span className="block text-xs text-slate-400 leading-none mt-0.5">{student.name}</span></div></div>
      <button onClick={onLogout} className="text-sm text-slate-500 hover:text-slate-700 font-medium">Log out</button>
    </header>
    <div className="max-w-2xl mx-auto p-4 sm:p-6 space-y-5 fade-in">
      {/* TOK */}
      <Card className="overflow-hidden">
        <div className="px-5 pt-5 pb-4 border-b border-slate-50 flex items-center justify-between"><div><h2 className="font-extrabold text-slate-800 text-lg">Theory of Knowledge</h2><p className="text-xs text-slate-400 mt-0.5">Exhibition · Essay</p></div><div className="flex gap-2"><PBadge done={exDone} total={3}/><PBadge done={essDone} total={4}/></div></div>
        <div className="p-5 space-y-5">
          {tok?<>
            <div><h3 className="text-xs font-bold text-slate-400 uppercase tracking-wider mb-3">Exhibition</h3><div className="space-y-2.5"><IBCheckbox readOnly label="Planning Conference" checked={tok.exhibition_planning_conference}/><IBCheckbox readOnly label="Written Feedback" checked={tok.exhibition_written_feedback}/><IBCheckbox readOnly label="Final Draft In" checked={tok.exhibition_final_draft_in}/></div>{tok.exhibition_score&&<div className="mt-3 flex items-center gap-2"><span className="text-xs font-bold text-slate-400 uppercase tracking-wide">Score:</span><span className="text-sm font-bold text-indigo-600">{tok.exhibition_score}</span></div>}{tok.exhibition_comment&&<div className="mt-3 p-3 bg-indigo-50 rounded-xl"><p className="text-xs font-bold text-indigo-400 uppercase tracking-wide mb-1.5">Teacher Comment</p><p className="text-sm text-slate-700 leading-relaxed">{tok.exhibition_comment}</p></div>}</div>
            <div className="border-t border-slate-50 pt-5"><h3 className="text-xs font-bold text-slate-400 uppercase tracking-wider mb-3">Essay</h3><div className="space-y-3"><IBCheckbox readOnly label="Interaction 1" checked={tok.essay_interaction_1}/>{tok.essay_interaction_1_comment&&<div className="ml-8 p-2.5 bg-slate-50 rounded-lg text-xs text-slate-600 leading-relaxed">{tok.essay_interaction_1_comment}</div>}<IBCheckbox readOnly label="Interaction 2" checked={tok.essay_interaction_2}/>{tok.essay_interaction_2_comment&&<div className="ml-8 p-2.5 bg-slate-50 rounded-lg text-xs text-slate-600 leading-relaxed">{tok.essay_interaction_2_comment}</div>}<IBCheckbox readOnly label="Interaction 3" checked={tok.essay_interaction_3}/><IBCheckbox readOnly label="Final Draft Submitted" checked={tok.essay_final_draft_submitted}/></div>{tok.essay_score&&<div className="mt-3 flex items-center gap-2"><span className="text-xs font-bold text-slate-400 uppercase tracking-wide">Score:</span><span className="text-sm font-bold text-indigo-600">{tok.essay_score}</span></div>}{tok.essay_comment&&<div className="mt-3 p-3 bg-indigo-50 rounded-xl"><p className="text-xs font-bold text-indigo-400 uppercase tracking-wide mb-1.5">Teacher Comment</p><p className="text-sm text-slate-700 leading-relaxed">{tok.essay_comment}</p></div>}</div>
          </>:<p className="text-slate-400 text-sm">No data yet.</p>}
        </div>
      </Card>
      {/* CAS */}
      <Card className="overflow-hidden">
        <div className="px-5 pt-5 pb-4 border-b border-slate-50 flex items-center justify-between"><div><h2 className="font-extrabold text-slate-800 text-lg">CAS</h2><p className="text-xs text-slate-400 mt-0.5">Creativity · Activity · Service</p></div><PBadge done={outDone} total={7}/></div>
        <div className="p-5 space-y-5">
          {cas?<>
            <div><h3 className="text-xs font-bold text-slate-400 uppercase tracking-wider mb-3">Interviews</h3><div className="space-y-3">{[['First Interview','interview_1_date','interview_1_comment'],['Second Interview','interview_2_date','interview_2_comment'],['Final Interview','interview_final_date','interview_final_comment']].map(([label,dk,ck])=>cas[dk]||cas[ck]?<div key={label} className="border border-slate-100 rounded-xl p-3"><div className="flex items-center justify-between mb-1"><span className="text-sm font-bold text-slate-700">{label}</span>{cas[dk]&&<span className="text-xs text-slate-400 bg-slate-100 px-2 py-0.5 rounded-full">{cas[dk]}</span>}</div>{cas[ck]&&<p className="text-sm text-slate-600 leading-relaxed">{cas[ck]}</p>}</div>:<div key={label} className="border border-dashed border-slate-100 rounded-xl p-3"><span className="text-sm text-slate-300">{label} — not yet scheduled</span></div>)}{cas.extra_interactions.map((ex,i)=><div key={i} className="border border-slate-100 rounded-xl p-3"><div className="flex items-center justify-between mb-1"><span className="text-sm font-bold text-slate-700">Extra Interaction {i+1}</span>{ex.date&&<span className="text-xs text-slate-400 bg-slate-100 px-2 py-0.5 rounded-full">{ex.date}</span>}</div>{ex.comment&&<p className="text-sm text-slate-600 leading-relaxed">{ex.comment}</p>}</div>)}</div></div>
            <div className="flex gap-2 flex-wrap">{[['Project Decided',cas.cas_project_decided,'amber'],['Project Complete',cas.cas_project_complete,'emerald'],['Creativity',cas.strand_creativity,'indigo'],['Activity',cas.strand_activity,'indigo'],['Service',cas.strand_service,'indigo']].map(([l,on,c])=><span key={l} className={`text-xs font-bold px-3 py-1.5 rounded-full border ${on?`bg-${c}-50 border-${c}-200 text-${c}-700`:'bg-slate-50 border-slate-200 text-slate-400'}`}>{l}</span>)}</div>
            <div><h3 className="text-xs font-bold text-slate-400 uppercase tracking-wider mb-3">Outcomes <span className={`ml-2 px-2 py-0.5 rounded-full text-xs font-bold ${outDone===7?'bg-emerald-100 text-emerald-700':outDone>0?'bg-amber-100 text-amber-700':'bg-slate-100 text-slate-400'}`}>{outDone}/7</span></h3><div className="space-y-2.5">{OUTCOMES.map((label,i)=><IBCheckbox key={i} readOnly label={label} checked={cas[`outcome_${i+1}`]}/>)}</div></div>
          </>:<p className="text-slate-400 text-sm">No CAS data yet.</p>}
        </div>
      </Card>
      {/* EE */}
      <Card className="overflow-hidden">
        <div className="px-5 pt-5 pb-4 border-b border-slate-50 flex items-center justify-between"><div><h2 className="font-extrabold text-slate-800 text-lg">Extended Essay</h2><p className="text-xs text-slate-400 mt-0.5">{ee?.ee_subject||'Subject TBC'}</p></div><PBadge done={eeProg} total={3}/></div>
        <div className="p-5 space-y-5">
          {ee?<>
            {ee.ee_rq&&<div className="p-3 bg-slate-50 rounded-xl border border-slate-100"><p className="text-xs font-bold text-slate-400 uppercase tracking-wide mb-1.5">Research Question</p><p className="text-sm text-slate-700 leading-relaxed font-medium italic">{ee.ee_rq}</p></div>}
            <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
              <div><h3 className="text-xs font-bold text-slate-400 uppercase tracking-wider mb-3">Progress</h3><div className="space-y-2.5"><IBCheckbox readOnly label="Annotated Bibliography" checked={ee.annotated_bibliography}/><IBCheckbox readOnly label="Draft Submitted" checked={ee.draft_submitted}/><IBCheckbox readOnly label="Final Draft Submitted" checked={ee.final_draft_submitted}/></div></div>
              <div><h3 className="text-xs font-bold text-slate-400 uppercase tracking-wider mb-3">Supervisor Interactions</h3><div className="space-y-2.5"><IBCheckbox readOnly label="Interaction 1" checked={ee.supervisor_interaction_1}/><IBCheckbox readOnly label="Interaction 2" checked={ee.supervisor_interaction_2}/><IBCheckbox readOnly label="Interaction 3" checked={ee.supervisor_interaction_3}/></div></div>
              <div><h3 className="text-xs font-bold text-slate-400 uppercase tracking-wider mb-3">Reflections</h3><div className="space-y-2.5"><IBCheckbox readOnly label="Reflection 1" checked={ee.reflection_1}/><IBCheckbox readOnly label="Reflection 2" checked={ee.reflection_2}/><IBCheckbox readOnly label="Final Reflection" checked={ee.reflection_3_final}/></div></div>
              <div><h3 className="text-xs font-bold text-slate-400 uppercase tracking-wider mb-3">Summary</h3><div className="space-y-2"><IBCheckbox readOnly label="Supervisor Comments Complete" checked={ee.supervisor_comments_complete}/>{ee.hours&&<div className="flex items-center gap-2 mt-2"><span className="text-xs font-bold text-slate-400 uppercase tracking-wide">Hours:</span><span className="text-sm font-bold text-slate-700">{ee.hours}</span></div>}{ee.score&&<div className="flex items-center gap-2"><span className="text-xs font-bold text-slate-400 uppercase tracking-wide">Score:</span><span className="text-sm font-bold text-indigo-600">{ee.score}</span></div>}</div></div>
            </div>
          </>:<p className="text-slate-400 text-sm">No EE data yet.</p>}
        </div>
      </Card>
    </div>
  </div>;
}

// ── APP ROOT ─────────────────────────────────────────────────
function App(){
  const [session,setSession]=useState(()=>{try{return JSON.parse(localStorage.getItem('ib_session')||'null');}catch{return null;}});
  const [students,setStudents]=useState([]);
  const [tokData,setTokData]=useState([]);
  const [casData,setCasData]=useState([]);
  const [eeData,setEeData]=useState([]);
  const [loading,setLoading]=useState(false);
  const [error,setError]=useState('');
  const [saveStatus,setSaveStatus]=useState('');
  const saveTimer=useRef(null);
  const showSaved=()=>{setSaveStatus('saving');clearTimeout(saveTimer.current);saveTimer.current=setTimeout(()=>setSaveStatus('saved'),700);setTimeout(()=>setSaveStatus(''),3000);};

  const loadData=useCallback(async()=>{
    setLoading(true);
    try{
      const [sRows,tRows,cRows,eRows]=await Promise.all([sheetsGet('Students!A:E'),sheetsGet('TOK!A:N'),sheetsGet('CAS!A:T'),sheetsGet('EE!A:O')]);
      setStudents(parseStudents(sRows));setTokData(parseTOK(tRows));setCasData(parseCAS(cRows));setEeData(parseEE(eRows));
    }catch(err){setError(err.message||'Failed to load data.');}
    setLoading(false);
  },[]);

  useEffect(()=>{if(session)loadData();},[session]);

  const handleLogin=sess=>{localStorage.setItem('ib_session',JSON.stringify(sess));setSession(sess);};
  const handleLogout=()=>{localStorage.removeItem('ib_session');setSession(null);setStudents([]);setTokData([]);setCasData([]);setEeData([]);};

  const handleUpdate=useCallback(async(type,newData,rowIdx,persist=false)=>{
    if(type==='tok'){setTokData(prev=>prev.map((t,i)=>i===rowIdx?newData:t));if(persist){showSaved();try{await saveTOK(newData,rowIdx);}catch(e){setError(e.message);}}}
    else if(type==='cas'){setCasData(prev=>prev.map((c,i)=>i===rowIdx?newData:c));if(persist){showSaved();try{await saveCAS(newData,rowIdx);}catch(e){setError(e.message);}}}
    else if(type==='ee'){setEeData(prev=>prev.map((e,i)=>i===rowIdx?newData:e));if(persist){showSaved();try{await saveEE(newData,rowIdx);}catch(e){setError(e.message);}}}
  },[]);

  const handleAddStudent=useCallback(async(form)=>{
    const blankTOK=[form.student_id,'FALSE','FALSE','FALSE','','','FALSE','FALSE','FALSE','FALSE','','','',''];
    const blankCAS=[form.student_id,'','','','','','','[]','FALSE','FALSE','FALSE','FALSE','FALSE','FALSE','FALSE','FALSE','FALSE','FALSE','FALSE','FALSE'];
    const blankEE =[form.student_id,'','','FALSE','FALSE','FALSE','FALSE','FALSE','FALSE','FALSE','FALSE','FALSE','FALSE','',''];
    const blankStu=[form.student_id,form.name,form.password||'','',''];
    await sheetsAppend('Students!A:E',[blankStu]);
    await sheetsAppend('TOK!A:N',[blankTOK]);
    await sheetsAppend('CAS!A:T',[blankCAS]);
    await sheetsAppend('EE!A:O',[blankEE]);
    setStudents(prev=>[...prev,{student_id:form.student_id,name:form.name,password:form.password,ee_subject:'',ee_rq:''}]);
    setTokData(prev=>[...prev,parseTOK([['hdr'],blankTOK])[0]]);
    setCasData(prev=>[...prev,parseCAS([['hdr'],blankCAS])[0]]);
    setEeData(prev=>[...prev,parseEE([['hdr'],blankEE])[0]]);
  },[]);

  if(!session)return <LoginScreen onLogin={handleLogin}/>;
  if(loading)return <div className="min-h-screen flex flex-col items-center justify-center bg-slate-50 gap-4"><Spinner size="lg"/><p className="text-slate-500 font-medium">Loading student data…</p></div>;
  if(session.role==='admin')return <AdminDashboard students={students} tokData={tokData} casData={casData} eeData={eeData} onLogout={handleLogout} saveStatus={saveStatus} error={error} onDismissError={()=>setError('')}/>;
  if(session.role==='student'){const tok=tokData.find(t=>t.student_id===session.student_id);const cas=casData.find(c=>c.student_id===session.student_id);const ee=eeData.find(e=>e.student_id===session.student_id);const stu=students.find(s=>s.student_id===session.student_id);return <StudentDashboard student={stu||session} tok={tok} cas={cas} ee={ee} onLogout={handleLogout}/>;}
  return <TeacherDashboard students={students} tokData={tokData} casData={casData} eeData={eeData} onUpdate={handleUpdate} onAddStudent={handleAddStudent} onLogout={handleLogout} saveStatus={saveStatus} error={error} onDismissError={()=>setError('')}/>;
}

const root=ReactDOM.createRoot(document.getElementById('root'));
root.render(<App/>);
</script>
</body>
</html>
