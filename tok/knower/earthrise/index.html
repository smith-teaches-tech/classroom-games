function imgCard(url, alt, label, fallbackSvg, idLabel) {
  const id = 'img_' + Math.random().toString(36).slice(2, 8);
  return `<div class="image-card">
    <div class="image-wrap">
      <img id="${id}" src="${url}" alt="${alt}" data-fallback='${fallbackSvg.replace(/'/g, "&apos;")}' onerror="useFallback('${id}')"/>
      ${idLabel ? `<span class="nasa-id">${idLabel}</span>` : ''}
    </div>
    ${label ? `<div class="image-card-label">${label}</div>` : ''}
  </div>`;
}

function useFallback(id) {
  const img = document.getElementById(id);
  if (!img) return;
  const fallback = img.getAttribute('data-fallback').replace(/&apos;/g, "'");
  const wrap = img.parentElement;
  const badge = wrap.querySelector('.nasa-id');
  wrap.innerHTML = fallback;
  if (badge) wrap.appendChild(badge);
}

// ===== NAVIGATION =====
let currentStep = 0;
const visited = new Set([0]);

function render() {
  const step = STEPS[currentStep];
  const stage = document.getElementById('stage');
  const imageColInner = document.getElementById('image-col-inner');
  const textContent = document.getElementById('text-content');

  // Set layout class on stage
  stage.classList.remove('layout-fullwidth', 'layout-split');
  stage.classList.add('layout-' + step.layout);

  imageColInner.innerHTML = typeof step.imageHTML === 'function' ? step.imageHTML() : step.imageHTML;
  textContent.innerHTML = step.contextHTML;

  imageColInner.classList.remove('fade-in');
  textContent.classList.remove('fade-in');
  void imageColInner.offsetWidth;
  imageColInner.classList.add('fade-in');
  textContent.classList.add('fade-in');

  document.getElementById('step-counter').textContent = `${currentStep + 1} / ${STEPS.length}`;
  document.getElementById('btn-prev').disabled = currentStep === 0;
  document.getElementById('btn-next').disabled = currentStep === STEPS.length - 1;
  document.getElementById('btn-next').textContent = currentStep === STEPS.length - 1 ? 'End' : 'Next ▸';

  visited.add(currentStep);
  renderProgressDots();

  document.getElementById('text-col').scrollTop = 0;
}

function navigate(delta) {
  const next = currentStep + delta;
  if (next < 0 || next >= STEPS.length) return;
  currentStep = next;
  render();
}

function goToStep(n) {
  currentStep = n;
  render();
}

function renderProgressDots() {
  const track = document.getElementById('progress-track');
  track.innerHTML = STEPS.map((s, i) => {
    const cls = i === currentStep ? 'active' : (visited.has(i) ? 'visited' : '');
    return `<button class="progress-dot ${cls}" onclick="goToStep(${i})" title="Step ${i+1}: ${s.title}">${i+1}</button>`;
  }).join('');
}

document.addEventListener('keydown', (e) => {
  if (e.key === 'ArrowRight') navigate(1);
  if (e.key === 'ArrowLeft') navigate(-1);
});

render();
