<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>How Science Changes Its Mind — TOK Natural Sciences L5</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#f4efe2; --paper-2:#efe8d6; --ink:#2a2622; --ink-soft:#5a5145;
    --blue:#1f3f6e; --blue-2:#3a629c; --amber:#b07d18; --amber-2:#caa24a; --rust:#8a3b2a;
    --line:#cbbf9f; --good:#3f6b3a;
    --serif:"Cormorant Garamond",Georgia,"Times New Roman",serif;
    --mono:"JetBrains Mono","Courier New",monospace;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    font-family:var(--serif); color:var(--ink); background:var(--paper);
    background-image:
      radial-gradient(circle at 18% 12%, rgba(176,125,24,.05), transparent 40%),
      radial-gradient(circle at 82% 88%, rgba(31,63,110,.05), transparent 42%),
      repeating-linear-gradient(0deg, transparent, transparent 27px, rgba(120,108,80,.035) 27px, rgba(120,108,80,.035) 28px);
    line-height:1.45; -webkit-font-smoothing:antialiased; padding:24px 16px 90px;
  }
  .wrap{max-width:880px;margin:0 auto;}
  header.pin{border:1px solid var(--line); background:linear-gradient(180deg,var(--paper-2),var(--paper));
    padding:16px 20px 14px; box-shadow:0 1px 0 #fff inset, 0 6px 18px rgba(40,34,26,.06); position:relative;}
  header.pin::before{content:"NATURAL SCIENCES · LESSON 5"; font-family:var(--mono); font-size:10px;
    letter-spacing:.22em; color:var(--amber); display:block; margin-bottom:6px;}
  header.pin h1{font-size:30px;font-weight:600;margin:0 0 4px;letter-spacing:.01em;line-height:1.05;}
  .kq{font-style:italic;color:var(--blue);font-size:18px;margin:2px 0 12px;}
  .tags{display:flex;gap:8px;flex-wrap:wrap;}
  .tag{font-family:var(--mono);font-size:10px;letter-spacing:.12em;text-transform:uppercase;
    border:1px solid var(--blue-2);color:var(--blue);border-radius:2px;padding:3px 8px;background:rgba(58,98,156,.06);}

  .dots{display:flex;gap:7px;align-items:center;justify-content:center;margin:18px 0 6px;flex-wrap:wrap;}
  .dot{width:9px;height:9px;border-radius:50%;border:1.5px solid var(--blue-2);background:transparent;transition:.25s;}
  .dot.active{background:var(--amber);border-color:var(--amber);transform:scale(1.25);}
  .dot.done{background:var(--blue-2);}
  .stepname{text-align:center;font-family:var(--mono);font-size:10px;letter-spacing:.2em;color:var(--ink-soft);text-transform:uppercase;margin-bottom:14px;}

  .stage{display:none;border:1px solid var(--line);background:rgba(255,253,247,.6);
    padding:26px 26px 28px;box-shadow:0 8px 30px rgba(40,34,26,.07);animation:rise .4s ease;}
  .stage.show{display:block;}
  @keyframes rise{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:none;}}
  .stage h2{font-size:25px;font-weight:600;margin:0 0 4px;}
  .lead{color:var(--ink-soft);font-size:17px;margin:0 0 16px;}
  .nudge{font-family:var(--mono);font-size:11.5px;color:var(--ink-soft);letter-spacing:.02em;margin:-2px 0 10px;}
  .beatsvg [data-i]{transition:opacity .12s;} .beatsvg [data-i]:hover{opacity:.62;}
  .micro{font-family:var(--mono);font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:var(--amber);margin:0 0 4px;}

  /* ranking */
  .scale{display:flex;justify-content:space-between;font-family:var(--mono);font-size:10.5px;
    letter-spacing:.08em;color:var(--ink-soft);text-transform:uppercase;margin:0 2px 8px;}
  .scale b{color:var(--rust);} .scale span:last-child b{color:var(--good);}
  ol.rank{list-style:none;margin:0;padding:0;}
  ol.rank li{display:flex;align-items:center;gap:12px;border:1px solid var(--line);background:var(--paper);
    margin:7px 0;padding:11px 12px;cursor:grab;transition:.15s;border-left:4px solid var(--blue-2);}
  ol.rank li.drag{opacity:.45;}
  ol.rank li .num{font-family:var(--mono);font-weight:700;color:var(--blue);min-width:20px;}
  ol.rank li .claim{flex:1;font-size:17px;}
  ol.rank li .ctl{display:flex;flex-direction:column;gap:2px;}
  ol.rank li .ctl button{font-family:var(--mono);border:1px solid var(--line);background:var(--paper-2);
    color:var(--blue);cursor:pointer;width:26px;height:18px;line-height:1;font-size:11px;border-radius:2px;}
  ol.rank li .ctl button:hover{background:var(--amber-2);color:#fff;}
  .compare{display:grid;grid-template-columns:1fr 1fr;gap:18px;}
  .compare h4{font-family:var(--mono);font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-soft);margin:0 0 8px;}
  ol.prev{list-style:none;margin:0;padding:0;}
  ol.prev li{border:1px solid var(--line);background:var(--paper-2);margin:7px 0;padding:11px 12px;font-size:15.5px;color:var(--ink-soft);}
  @media(max-width:640px){.compare{grid-template-columns:1fr;}}

  /* beat layout */
  .beatsvg{border:1px solid var(--line);background:radial-gradient(circle at 50% 46%,#fbf7ec,#efe8d6);padding:4px;margin:4px 0 12px;}
  .beatsvg svg{width:100%;height:auto;display:block;}
  .block{margin:14px 0;opacity:0;max-height:0;overflow:hidden;transition:opacity .4s ease;}
  .block.shown{opacity:1;max-height:1400px;}
  .prompt{font-family:var(--mono);font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:var(--amber);margin-bottom:6px;}
  .qline{font-size:16.5px;color:var(--blue);font-style:italic;margin-bottom:8px;}
  .opts{display:flex;gap:9px;flex-wrap:wrap;}
  .opt{font-family:var(--mono);font-size:12px;letter-spacing:.04em;border:1px solid var(--blue-2);background:var(--paper);
    color:var(--blue);padding:9px 16px;cursor:pointer;border-radius:2px;transition:.15s;}
  .opt:hover{background:var(--blue);color:#fff;}
  .opt.pick-good{background:var(--good);border-color:var(--good);color:#fff;}
  .opt.pick-bad{background:var(--rust);border-color:var(--rust);color:#fff;}
  .opt.dim{opacity:.4;pointer-events:none;}
  .fb{font-size:15.5px;margin-top:8px;padding:9px 12px;border-left:4px solid var(--line);background:rgba(120,108,80,.06);display:none;}
  .fb.show{display:block;}
  .fb.ok{border-left-color:var(--good);} .fb.no{border-left-color:var(--amber);}

  .testrow{border:1px solid var(--line);background:var(--paper);padding:12px 14px;margin:8px 0;}
  .verdict-strip{margin-top:10px;font-family:var(--mono);font-size:13px;font-weight:700;letter-spacing:.06em;
    padding:8px 12px;border-radius:2px;text-align:center;display:none;}
  .verdict-strip.show{display:block;}
  .vd-hold{background:rgba(63,107,58,.16);color:var(--good);border:1px solid var(--good);}
  .vd-fail{background:rgba(138,59,42,.13);color:var(--rust);border:1px solid var(--rust);}
  .vd-warn{background:rgba(176,125,24,.14);color:var(--amber);border:1px solid var(--amber);}

  .nameit{border:1px solid var(--blue-2);border-left:5px solid var(--amber);background:rgba(58,98,156,.05);padding:14px 16px;}
  .nameit .nl{font-family:var(--mono);font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--amber);font-weight:700;}
  .nameit .nb{font-size:16.5px;margin-top:6px;}
  .nameit .nb em{color:var(--blue);font-style:italic;}

  .handoff{border:2px dashed var(--amber);background:rgba(176,125,24,.07);padding:13px 16px;text-align:center;}
  .handoff .hl{font-family:var(--mono);font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--amber);font-weight:700;}
  .handoff .hb{font-size:17px;margin-top:3px;color:var(--ink);}

  /* textbook pages (beat 5) */
  .pg{border:1px solid var(--line);background:#f7f2e6;padding:16px 18px 14px;position:relative;box-shadow:0 4px 14px rgba(40,34,26,.08);margin:6px 0;}
  .pg .yr{font-family:var(--mono);font-size:10px;letter-spacing:.2em;color:var(--rust);}
  .pg .src{font-family:var(--mono);font-size:9.5px;color:var(--ink-soft);margin-bottom:6px;}
  .pg p{font-size:15px;margin:6px 0;}
  .pg .stamp{position:absolute;top:9px;right:11px;font-family:var(--mono);font-size:9px;letter-spacing:.15em;
    border:1px solid var(--rust);color:var(--rust);padding:2px 5px;transform:rotate(5deg);opacity:.75;}

  .nav{display:flex;justify-content:space-between;align-items:center;margin-top:22px;gap:10px;}
  .btn{font-family:var(--mono);font-size:12px;letter-spacing:.08em;text-transform:uppercase;
    padding:11px 22px;border:1px solid var(--blue);background:var(--blue);color:#fff;cursor:pointer;border-radius:2px;transition:.15s;}
  .btn:hover{background:var(--blue-2);}
  .btn.ghost{background:transparent;color:var(--blue);} .btn.ghost:hover{background:rgba(31,63,110,.07);}
  .btn:disabled{opacity:.3;cursor:not-allowed;}
  .done-card{border:1px solid var(--line);background:rgba(176,125,24,.06);padding:16px 18px;margin-top:16px;text-align:center;}
  .done-card .dl{font-family:var(--mono);font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--amber);}
  .done-card .db{font-size:17px;margin-top:4px;}
  .footnote{font-family:var(--mono);font-size:10px;color:var(--ink-soft);text-align:center;margin-top:26px;letter-spacing:.04em;}
</style>
</head>
<body>
<div class="wrap">
  <header class="pin">
    <h1>How Science Changes Its Mind</h1>
    <div class="kq">How does science change its mind — and how settled is &ldquo;settled science&rdquo;?</div>
    <div class="tags"><span class="tag">Convergence</span><span class="tag">Paradigm</span><span class="tag">Certainty</span><span class="tag">Evidence</span></div>
  </header>
  <div class="dots" id="dots"></div>
  <div class="stepname" id="stepname"></div>
  <div id="screens"></div>
  <div class="footnote">TOK · Natural Sciences · Lesson 5 — record your answers in the worksheet as you go</div>
</div>

<script>
(function(){
  "use strict";

  /* ---------------- ranking cards ---------------- */
  var CARDS = [
    {id:"age",   text:"The Earth is about 4.5 billion years old"},
    {id:"desc",  text:"All living things share a common ancestry"},
    {id:"plate", text:"The continents move across the Earth\u2019s surface"},
    {id:"string",text:"String theory describes matter\u2019s smallest parts"},
    {id:"chol",  text:"Eating cholesterol raises your risk of heart disease"}
  ];

  /* ---------------- beats ---------------- */
  // role: support (blue, empirical) | model (amber, theory-internal) | conflict (rust) | dead (grey, dissolved)
  var BEATS = [
    { id:"age", tag:"Beat 1 of 5 \u00b7 What convergence IS", claim:"The Earth is about 4.5 billion years old",
      lead:"Four ways of measuring the Earth\u2019s age \u2014 each from a different science. Let\u2019s see what holds the claim up.",
      lines:[
        {l:"Dating Earth\u2019s oldest rocks", field:"Geology", role:"support"},
        {l:"Dating meteorites", field:"Planetary science", role:"support"},
        {l:"Lead-isotope ratios", field:"Chemistry", role:"support"},
        {l:"The Sun\u2019s modelled lifespan", field:"Astrophysics", role:"support"}
      ],
      predict:{ q:"Switch OFF the meteorite line. Will the claim still stand?", opts:["Still stands","Collapses"], correct:0, drop:1,
        reveal:"Still stands. The other three come from different sciences and still agree \u2014 no single line was holding it up." },
      test:[
        {q:"1 \u00b7 Independent? Do the lines come from different areas that don\u2019t lean on each other?", correct:"Yes",
         okYes:"Right \u2014 geology, planetary science, chemistry, astrophysics. Four different fields.",
         okNo:"Look again \u2014 these are four different sciences, none depending on the others."},
        {q:"2 \u00b7 Could each line have come out otherwise? (Could the measurement have disagreed?)", correct:"Yes",
         okYes:"Right \u2014 each is a measurement of the real world that risked giving a different number. That\u2019s empirical.",
         okNo:"Each is a real measurement that could have disagreed \u2014 that\u2019s what makes it empirical."},
        {q:"3 \u00b7 Do the lines agree with each other?", correct:"Yes",
         okYes:"Right \u2014 all four land on roughly the same age.",
         okNo:"They do agree \u2014 all four converge on about 4.5 billion years."}
      ],
      verdict:{cls:"vd-hold", txt:"ALL THREE: YES  \u2192  REAL CONVERGENCE, ROBUST"},
      nameIt:{label:"Name it \u2014 CONVERGENCE", body:"<em>Independent</em> lines, from <em>different areas</em>, each able to have <em>come out otherwise</em>, all <em>agreeing</em>. The claim is held up by all of them at once \u2014 so knocking one out doesn\u2019t topple it. That is what makes a claim robust."},
      handoff:null },

    { id:"desc", tag:"Beat 2 of 5 \u00b7 Your turn", claim:"All living things share a common ancestry",
      lead:"Now you run the test. (We\u2019re asking what holds the claim up \u2014 not whether you personally accept it. Same as any other claim on the board.)",
      lines:[
        {l:"Fossil record", field:"Palaeontology", role:"support"},
        {l:"Comparative anatomy", field:"Anatomy", role:"support"},
        {l:"Shared DNA sequences", field:"Molecular biology", role:"support"},
        {l:"Species distribution", field:"Biogeography", role:"support"}
      ],
      predict:null,
      test:[
        {q:"1 \u00b7 Independent? Different areas that don\u2019t lean on each other?", correct:"Yes",
         okYes:"Right \u2014 fossils, anatomy, DNA, geography are gathered by different methods.",
         okNo:"These come from four separate fields, gathered independently."},
        {q:"2 \u00b7 Could each have come out otherwise? (Empirical?)", correct:"Yes",
         okYes:"Right \u2014 the DNA could have shown no shared pattern; it didn\u2019t. Each line risked disagreeing.",
         okNo:"Each line could have come out differently when measured \u2014 so each is empirical."},
        {q:"3 \u00b7 Do the lines agree?", correct:"Yes",
         okYes:"Right \u2014 independent fields point to the same structure.",
         okNo:"They converge \u2014 separate fields land in the same place."}
      ],
      verdict:{cls:"vd-hold", txt:"ALL THREE: YES  \u2192  REAL CONVERGENCE, ROBUST"},
      nameIt:{label:"Name it \u2014 same shape as Beat 1", body:"Independent + empirical + agreeing = convergence. Two robust claims now. Hold that picture \u2014 the next two claims are going to <em>fail</em> the test, each in a different way."},
      handoff:null },

    { id:"string", tag:"Beat 3 of 5 \u00b7 When the support is the wrong kind", claim:"String theory describes matter\u2019s smallest parts",
      lead:"String theory is rigorous and admired. Run the same test on what supports it.",
      lines:[
        {l:"Mathematically consistent", field:"the theory\u2019s maths", role:"model"},
        {l:"Unifies gravity & quantum theory", field:"the theory\u2019s maths", role:"model"},
        {l:"Predicts the graviton", field:"the theory\u2019s maths", role:"model"},
        {l:"Requires extra dimensions", field:"the theory\u2019s maths", role:"model"}
      ],
      predict:null,
      test:[
        {q:"1 \u00b7 Independent? Do the lines touch different ideas?", correct:"Yes",
         okYes:"On the surface, yes \u2014 gravity, dimensions, particles. Hold that thought for question 2.",
         okNo:"They do range over different ideas \u2014 keep going to question 2, that\u2019s where the catch is."},
        {q:"2 \u00b7 Could each have come out otherwise? Could you check it against the world?", correct:"No",
         okNo:"This is the catch. None could have come out otherwise \u2014 they\u2019re all results of the same maths, not separate observations of the world. So they\u2019re not independent <em>evidence</em>; they\u2019re one idea restated.",
         okYes:"Look closer \u2014 \u2018mathematically consistent\u2019 can\u2019t be checked by looking at the world. None of these could fail against an observation. The honest answer here is No."},
        {q:"3 \u00b7 Do the lines agree with each other?", correct:"Yes",
         okYes:"Yes \u2014 but agreement among results of the same maths isn\u2019t convergence of evidence.",
         okNo:"They\u2019re consistent \u2014 but that consistency is the problem, not the proof."}
      ],
      verdict:{cls:"vd-fail", txt:"FAILS AT QUESTION 2  \u2192  NOT REAL CONVERGENCE"},
      nameIt:{label:"Name it \u2014 MODEL SUPPORT vs EMPIRICAL SUPPORT", body:"The lines <em>looked</em> like different evidence, but not one is an observation that could have failed \u2014 they\u2019re all the same mathematics. <em>Coherence of a model is not convergence of evidence.</em> Only observations that could have come out otherwise can converge. String theory has the first kind, not the second \u2014 so it sits among the least-settled claims, not because it\u2019s sloppy, but because the method can\u2019t yet reach it (your L2 falsifiability point, your L3 edge)."},
      handoff:"Question 1" },

    { id:"chol", tag:"Beat 4 of 5 \u00b7 When the lines disagree", claim:"Eating cholesterol raises your risk of heart disease",
      lead:"This one has real, empirical lines \u2014 measured in the world. Run the test.",
      lines:[
        {l:"Early population studies", field:"Epidemiology", role:"support"},
        {l:"Some metabolic trials", field:"Clinical research", role:"support"},
        {l:"Later trials: saturated fat matters more", field:"Clinical research", role:"conflict"},
        {l:"2015 guidelines drop the limit", field:"Evidence review", role:"conflict"}
      ],
      predict:null,
      test:[
        {q:"1 \u00b7 Independent? Different methods, not leaning on each other?", correct:"Yes",
         okYes:"Right \u2014 population studies and clinical trials are different methods.",
         okNo:"They are different methods \u2014 epidemiology vs trials."},
        {q:"2 \u00b7 Could each have come out otherwise? (Empirical?)", correct:"Yes",
         okYes:"Right \u2014 these are real measurements in the world that could have come out either way. Unlike string theory, the support IS empirical.",
         okNo:"These are real-world measurements \u2014 they could have come out differently. So yes, empirical."},
        {q:"3 \u00b7 Do the lines agree with each other?", correct:"No",
         okNo:"Right \u2014 here\u2019s the failure. Some lines support the claim and others pull against it. The evidence is real, but it doesn\u2019t point one way.",
         okYes:"Look again \u2014 the later trials and the 2015 review pull <em>against</em> the early studies. They disagree."}
      ],
      verdict:{cls:"vd-fail", txt:"FAILS AT QUESTION 3  \u2192  CONTRADICTION, NOT CONVERGENCE"},
      nameIt:{label:"Name it \u2014 CONTRADICTION, not convergence", body:"Real, independent, empirical lines \u2014 that <em>disagree</em>. So the claim is contested and actively being revised (which is why health headlines flip). This is a <em>known</em> unknown: we know exactly what the question is, the evidence just hasn\u2019t resolved it yet. Different failure from string theory \u2014 there the support was the wrong kind; here it\u2019s the right kind but it doesn\u2019t line up."},
      handoff:"Question 2" }
  ];

  // Beat 5 is bespoke (drift / paradigm) and rendered separately.

  /* ---------------- state + nav ---------------- */
  var round1=null;
  var screensEl=document.getElementById("screens");
  var stageDefs=[]; // {name, build(el)}

  function addStage(name, build){ stageDefs.push({name:name, build:build}); }

  // 1. RANK
  addStage("Rank", function(el){
    el.innerHTML =
      '<div class="micro">Step 1 \u00b7 Commit first</div>'+
      '<h2>Which science is least likely to change?</h2>'+
      '<p class="lead">Drag the cards (or use the arrows) to order them \u2014 gut instinct, no looking anything up.</p>'+
      '<div class="scale"><span><b>TOP</b> \u2014 most likely to change</span><span><b>BOTTOM</b> \u2014 most settled</span></div>'+
      '<ol class="rank" id="rank1"></ol>'+
      '<div class="nav"><span></span><button class="btn" id="lockBtn">Lock my ranking \u2192</button></div>';
    makeRankList("rank1", CARDS.slice());
    el.querySelector("#lockBtn").addEventListener("click", function(){
      round1 = readOrder("rank1"); go(idx+1);
    });
  });

  // 2..5  generic beats
  BEATS.forEach(function(beat){
    addStage(beat.id, function(el){ buildBeat(el, beat); });
  });

  // 6. BEAT 5 drift (bespoke)
  addStage("plate", function(el){ buildDrift(el); });

  // 7. RE-RANK
  addStage("Re-rank", function(el){
    el.innerHTML =
      '<div class="micro">Last step \u00b7 Order it again</div>'+
      '<h2>Re-rank \u2014 now with a rule.</h2>'+
      '<p class="lead">Sorting rule you can now use: uncontradicted <em>real</em> convergence is the most settled (sinks to the bottom); no real convergence (string theory) and contradicting evidence (cholesterol) are least settled (rise to the top). Continental drift is the warning \u2014 even the bottom isn\u2019t promised forever.</p>'+
      '<div class="compare"><div><h4>Round 1 \u2014 your gut</h4><ol class="prev" id="prev1"></ol></div>'+
      '<div><h4>Round 2 \u2014 with the rule</h4><ol class="rank" id="rank2"></ol></div></div>'+
      '<div class="done-card"><div class="dl">That\u2019s the activity</div>'+
      '<div class="db">Now finish in your worksheet: re-answer the Knowledge Question, then the two speculative questions.</div></div>'+
      '<div class="nav"><button class="btn ghost" id="backBtn">\u2190 Back</button><span></span></div>';
    var prev=el.querySelector("#prev1");
    (round1||CARDS).forEach(function(c,i){ var li=document.createElement("li"); li.textContent=(i+1)+".  "+c.text; prev.appendChild(li); });
    makeRankList("rank2", (round1||CARDS).slice());
    el.querySelector("#backBtn").addEventListener("click", function(){ go(idx-1); });
  });

  // build dots + stage elements
  var dotsWrap=document.getElementById("dots"), stepname=document.getElementById("stepname"), idx=0;
  var stageEls=[];
  stageDefs.forEach(function(def,i){
    var sec=document.createElement("section"); sec.className="stage"; screensEl.appendChild(sec); stageEls.push(sec);
    var d=document.createElement("div"); d.className="dot"; dotsWrap.appendChild(d);
  });
  function go(i){
    idx=i;
    stageEls.forEach(function(s,j){ s.classList.toggle("show", j===i); if(j===i && !s.dataset.built){ stageDefs[j].build(s); s.dataset.built="1"; } });
    [].forEach.call(dotsWrap.children,function(d,j){ d.classList.toggle("active",j===i); d.classList.toggle("done",j<i); });
    stepname.textContent=stageDefs[i].name;
    window.scrollTo({top:0,behavior:"smooth"});
  }

  /* ---------------- ranking helpers ---------------- */
  function makeRankList(elId, order){
    var ol=document.getElementById(elId); ol.innerHTML="";
    order.forEach(function(c){
      var li=document.createElement("li"); li.setAttribute("draggable","true"); li.dataset.id=c.id;
      li.innerHTML='<span class="num"></span><span class="claim">'+c.text+'</span>'+
        '<span class="ctl"><button data-up>\u25B2</button><button data-down>\u25BC</button></span>';
      ol.appendChild(li);
    });
    renumber(ol); wireMove(ol); wireDrag(ol);
  }
  function renumber(ol){ [].forEach.call(ol.children,function(li,i){ li.querySelector(".num").textContent=(i+1); }); }
  function wireMove(ol){
    ol.addEventListener("click",function(e){
      var li=e.target.closest("li"); if(!li) return;
      if(e.target.hasAttribute("data-up") && li.previousElementSibling){ ol.insertBefore(li, li.previousElementSibling); renumber(ol); }
      if(e.target.hasAttribute("data-down") && li.nextElementSibling){ ol.insertBefore(li.nextElementSibling, li); renumber(ol); }
    });
  }
  function wireDrag(ol){
    var dragged=null;
    ol.addEventListener("dragstart",function(e){ var li=e.target.closest("li"); if(!li)return; dragged=li; li.classList.add("drag"); });
    ol.addEventListener("dragend",function(){ if(dragged){dragged.classList.remove("drag");dragged=null;} renumber(ol); });
    ol.addEventListener("dragover",function(e){
      e.preventDefault(); var li=e.target.closest("li"); if(!li||li===dragged) return;
      var r=li.getBoundingClientRect(); var after=(e.clientY-r.top)/r.height>0.5;
      ol.insertBefore(dragged, after?li.nextElementSibling:li);
    });
  }
  function readOrder(elId){
    return [].map.call(document.getElementById(elId).children,function(li){
      var id=li.dataset.id; return CARDS.filter(function(c){return c.id===id;})[0];
    });
  }

  /* ---------------- shared SVG ---------------- */
  function wrapText(str,maxc){ var w=str.split(" "),a=[],c=""; w.forEach(function(x){ if((c+" "+x).length>maxc){a.push(c);c=x;} else c=(c?c+" ":"")+x; }); if(c)a.push(c); return a; }
  function lineColor(role,on){
    if(on===false) return "#c4b8a0";
    return role==="model"?"var(--amber)":role==="conflict"?"var(--rust)":role==="dead"?"#bcae90":"var(--blue-2)";
  }
  // draws radiating diagram; verdict = {txt,col,fill}; lines start at the circle EDGE so centre text stays clear
  function drawRadial(lines, active, verdict){
    var cx=360, cy=205, R=132, Rin=64, N=lines.length, html="";
    lines.forEach(function(ln,i){
      var on = active ? active[i] : true;
      var ang=(-145 + i*(290/Math.max(N-1,1)))*Math.PI/180; if(N===1) ang=Math.PI;
      var ca=Math.cos(ang), sa=Math.sin(ang);
      var sx=cx+ca*Rin, sy=cy+sa*Rin, ex=cx+ca*R, ey=cy+sa*R;
      var col=lineColor(ln.role,on);
      var dash = on===false?"5 5":(ln.role==="model"?"7 5":(ln.role==="conflict"?"2 4":(ln.role==="dead"?"3 5":"")));
      var lx=cx+ca*(R+9), ly=cy+sa*(R+9), anchor = ex<cx-18?"end":(ex>cx+18?"start":"middle");
      var arr=wrapText(ln.l,17), ty=ly-(arr.length-1)*6.5;
      var tcol = on===false||ln.role==="dead"?"#a99":(ln.role==="conflict"?"var(--rust)":"var(--ink)");
      var deco = ln.role==="dead"?' text-decoration="line-through"':'';
      html+='<g data-i="'+i+'" style="cursor:pointer">';
      html+='<line x1="'+sx+'" y1="'+sy+'" x2="'+ex+'" y2="'+ey+'" stroke="'+col+'" stroke-width="'+(on===false||ln.role==="dead"?1.6:3)+'" stroke-dasharray="'+dash+'"/>';
      html+='<circle cx="'+ex+'" cy="'+ey+'" r="7" fill="'+col+'" stroke="#fff" stroke-width="1.5"/>';
      html+='<text x="'+lx+'" y="'+ty+'" text-anchor="'+anchor+'" font-family="JetBrains Mono,monospace" font-size="10.5" fill="'+tcol+'"'+deco+'>';
      arr.forEach(function(t,k){ html+='<tspan x="'+lx+'" dy="'+(k===0?0:12)+'">'+esc(t)+'</tspan>'; });
      html+='</text>';
      html+='<text x="'+lx+'" y="'+(ty+arr.length*12)+'" text-anchor="'+anchor+'" font-family="JetBrains Mono,monospace" font-size="8.5" letter-spacing="1" fill="#9a8f74">'+esc(ln.field.toUpperCase())+'</text>';
      html+='</g>';
    });
    var col=verdict?verdict.col:"#b3a988", fill=verdict?verdict.fill:"rgba(150,138,110,.12)", txt=verdict?verdict.txt:"\u2014";
    html+='<circle cx="'+cx+'" cy="'+cy+'" r="56" fill="'+fill+'" stroke="'+col+'" stroke-width="3"/>';
    html+='<text x="'+cx+'" y="'+(cy-5)+'" text-anchor="middle" font-family="JetBrains Mono,monospace" font-size="9.5" letter-spacing="2" fill="'+col+'">THE CLAIM</text>';
    html+='<text x="'+cx+'" y="'+(cy+14)+'" text-anchor="middle" font-family="JetBrains Mono,monospace" font-size="12.5" font-weight="700" fill="'+col+'">'+esc(txt)+'</text>';
    return '<svg viewBox="0 0 720 410" xmlns="http://www.w3.org/2000/svg">'+html+'</svg>';
  }
  function esc(s){return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}

  // live, role-aware verdict for the centre circle (drives the stand/fall demo)
  function liveVerdict(lines, active){
    var S=0, C=0, allModel = lines.length>0 && lines.every(function(l){return l.role==="model";});
    lines.forEach(function(ln,i){ var on=active?active[i]:true;
      if(ln.role==="conflict"){ if(on)C++; }
      else if(ln.role==="support"){ if(on)S++; } });
    if(allModel) return {txt:"NOT EMPIRICAL",col:"var(--amber)",fill:"rgba(176,125,24,.14)"};
    if(C>0) return {txt:"CONTESTED",col:"var(--amber)",fill:"rgba(176,125,24,.14)"};
    var hasConflict = lines.some(function(l){return l.role==="conflict";});
    if(S>=2) return hasConflict?{txt:"LOOKS SETTLED?",col:"var(--amber)",fill:"rgba(176,125,24,.14)"}
                               :{txt:"HOLDS",col:"var(--good)",fill:"rgba(63,107,58,.16)"};
    if(S===1) return {txt:"ONE THREAD",col:"var(--rust)",fill:"rgba(138,59,42,.13)"};
    return {txt:"COLLAPSES",col:"var(--rust)",fill:"rgba(138,59,42,.13)"};
  }
  function renderRadial(box, lines, active, verdict, onToggle){
    box.innerHTML=drawRadial(lines, active, verdict);
    if(onToggle){ [].forEach.call(box.querySelectorAll("[data-i]"),function(g){
      g.addEventListener("click",function(){ onToggle(+g.getAttribute("data-i")); }); }); }
  }

  /* ---------------- generic beat builder ---------------- */
  function buildBeat(el, beat){
    var nudges={
      age:"Try it \u2014 click the meteorite dot to switch that line off. Does the claim still stand? How many can you remove before it falls?",
      desc:"Click any dot to switch a line off and watch the centre.",
      string:"Click the dots to switch lines off \u2014 notice nothing you do makes the centre read HOLD. Hold that thought for question 2.",
      chol:"Try switching off the two red (conflicting) lines \u2014 watch the centre, then ask whether that move was honest."
    };
    var active = beat.lines.map(function(){return true;});
    el.innerHTML =
      '<div class="micro">'+beat.tag+'</div>'+
      '<h2>'+esc(beat.claim)+'</h2>'+
      '<p class="lead">'+beat.lead+'</p>'+
      '<p class="nudge">'+(nudges[beat.id]||"Click any dot to switch a line off and watch the centre.")+'</p>'+
      '<div class="beatsvg" id="svgbox"></div>'+
      '<div class="block shown" id="testBlk"><div class="prompt">The 3-question test</div><div id="testRows"></div><div class="verdict-strip" id="vstrip"></div></div>'+
      '<div class="block" id="nameBlk"><div class="nameit"><div class="nl">'+beat.nameIt.label+'</div><div class="nb">'+beat.nameIt.body+'</div></div></div>'+
      (beat.handoff?'<div class="block" id="handoffBlk"><div class="handoff"><div class="hl">\u270e Pause \u2014 go to your worksheet</div><div class="hb">Answer <strong>'+beat.handoff+'</strong> now, then come back.</div></div></div>':'')+
      '<div class="nav"><button class="btn ghost" id="backBtn">\u2190 Back</button><button class="btn" id="nextBtn" disabled>Next \u2192</button></div>';

    var svgbox=el.querySelector("#svgbox");
    function redraw(){ renderRadial(svgbox, beat.lines, active, liveVerdict(beat.lines, active), function(i){ active[i]=!active[i]; redraw(); }); }
    redraw();

    el.querySelector("#backBtn").addEventListener("click",function(){ go(idx-1); });
    var nextBtn=el.querySelector("#nextBtn"); nextBtn.addEventListener("click",function(){ go(idx+1); });

    var rowsEl=el.querySelector("#testRows"), answered=0;
    beat.test.forEach(function(row){
      var div=document.createElement("div"); div.className="testrow";
      div.innerHTML='<div class="qline">'+row.q+'</div><div class="opts"></div><div class="fb"></div>';
      var opts=div.querySelector(".opts"), fb=div.querySelector(".fb");
      ["Yes","No"].forEach(function(val){
        var b=document.createElement("button"); b.className="opt"; b.textContent=val;
        b.addEventListener("click",function(){
          [].forEach.call(opts.children,function(x){ x.classList.add("dim"); });
          b.classList.remove("dim"); var right=(val===row.correct); b.classList.add(right?"pick-good":"pick-bad");
          fb.innerHTML = (val==="Yes"?row.okYes:row.okNo); fb.classList.add("show", right?"ok":"no");
          if(!div.dataset.done){ div.dataset.done="1"; answered++; if(answered===beat.test.length) finishTest(); }
        });
        opts.appendChild(b);
      });
      rowsEl.appendChild(div);
    });

    function finishTest(){
      var vs=el.querySelector("#vstrip"); vs.className="verdict-strip show "+beat.verdict.cls; vs.textContent=beat.verdict.txt;
      el.querySelector("#nameBlk").classList.add("shown");
      var h=el.querySelector("#handoffBlk"); if(h) h.classList.add("shown");
      nextBtn.disabled=false;
    }
  }

  /* ---------------- bespoke Beat 5: drift / paradigm ---------------- */
  function buildDrift(el){
    var fixed1942=[
      {l:"Mountains form by vertical flexing", field:"Geology", role:"support"},
      {l:"Land-bridges explain shared fossils", field:"Palaeontology", role:"support"},
      {l:"No known force could move a continent", field:"Physics", role:"support"}
    ];
    var fixed1968=[
      {l:"Vertical-flexing model superseded", field:"Geology", role:"dead"},
      {l:"A force WAS found: seafloor spreading", field:"Geophysics", role:"dead"},
      {l:"Stripes contradict a fixed crust", field:"Geophysics", role:"conflict"}
    ];
    var move1968=[
      {l:"Coastlines fit together", field:"Geography", role:"support"},
      {l:"Matching fossils across oceans", field:"Palaeontology", role:"support"},
      {l:"Seafloor magnetic stripes", field:"Geophysics", role:"support"},
      {l:"Earthquake & volcano belts", field:"Seismology", role:"support"}
    ];
    el.innerHTML =
      '<div class="micro">Beat 5 of 5 \u00b7 The exception</div>'+
      '<h2>Continents are fixed \u2014 the settled science of 1942</h2>'+
      '<div class="pg"><span class="stamp">SETTLED 1942</span><div class="yr">1942</div><div class="src">Geology textbook \u00b7 geosynclinal theory</div>'+
      '<p>The continents are fixed. Mountains rise where the crust buckles vertically. Wegener\u2019s \u2018drifting continents\u2019 is dismissed \u2014 no known force could move a continent, and the matching coastlines are coincidence.</p></div>'+
      '<p class="lead">This was the consensus. Run the same test on it \u2014 and switch its lines off to see how solid it looks.</p>'+
      '<p class="nudge">Click the dots to test it. Then answer the three questions.</p>'+
      '<div class="beatsvg" id="svgbox"></div>'+
      '<div class="block shown" id="testBlk"><div class="prompt">The 3-question test \u00b7 on \u201Ccontinents are fixed,\u201D 1942</div><div id="testRows"></div><div class="verdict-strip" id="vstrip"></div></div>'+
      '<div class="block" id="predictBlk"><div class="prompt">Now predict</div><div class="qline">The test just certified it as robust convergence. So it\u2019s safe \u2014 right? Press the button and watch.</div>'+
      '<div class="opts"><button class="opt" id="timeBtn">\u25B6  Advance to 1968 (new evidence arrives)</button></div></div>'+
      '<div class="block" id="revealBlk">'+
        '<div class="pg"><span class="stamp" style="border-color:var(--good);color:var(--good)">SETTLED 1968</span><div class="yr">1968</div><div class="src">Geology textbook \u00b7 plate tectonics</div>'+
        '<p>The continents move. Seafloor spreading is the force no one could find. \u201CContinents are fixed\u201D has collapsed.</p></div>'+
        '<p class="lead" style="margin-top:12px">And the claim that had a <em>single thread</em> in 1942? Run the test on it now \u2014 four independent lines converge:</p>'+
        '<div class="beatsvg" id="moveSvg"></div>'+
        '<div class="nameit"><div class="nl">The cut</div><div class="nb">\u201CContinents are fixed\u201D <em>passed all three questions</em>. Not string theory\u2019s problem \u2014 it WAS empirical. Not cholesterol\u2019s \u2014 the lines DID agree. So why did the robust claim fall and the one-thread claim win? Because the new evidence \u2014 seafloor spreading \u2014 wasn\u2019t something the test could weigh: in 1942 it wasn\u2019t evidence <em>for anything</em>. The framework had no place for it.</div></div>'+
        '<div class="nameit" style="margin-top:10px"><div class="nl">Name it \u2014 PARADIGM SHIFT</div><div class="nb">A <em>paradigm</em> is the framework a community works inside that decides what even counts as evidence. A <em>paradigm shift</em> changes that \u2014 so the test, which works <em>inside</em> a framework, cannot see the framework itself move. Convergence guards a claim against the gaps you can see; it offers nothing against the framework being replaced.</div></div>'+
      '</div>'+
      '<div class="block" id="handoffBlk"><div class="handoff"><div class="hl">\u270e Pause \u2014 go to your worksheet</div><div class="hb">Answer <strong>Questions 3 and 4</strong> now, then come back for the last step.</div></div></div>'+
      '<div class="nav"><button class="btn ghost" id="backBtn">\u2190 Back</button><button class="btn" id="nextBtn" disabled>Next \u2192</button></div>';

    var svgbox=el.querySelector("#svgbox"), fixedActive=[true,true,true], frozen=false;
    function redrawFixed(){ if(frozen) return; renderRadial(svgbox, fixed1942, fixedActive, liveVerdict(fixed1942, fixedActive), function(i){ fixedActive[i]=!fixedActive[i]; redrawFixed(); }); }
    redrawFixed();

    el.querySelector("#backBtn").addEventListener("click",function(){ go(idx-1); });
    var nextBtn=el.querySelector("#nextBtn"); nextBtn.addEventListener("click",function(){ go(idx+1); });

    var rows=[
      {q:"1 \u00b7 Independent? Different fields not leaning on each other?", correct:"Yes", ok:"Right \u2014 geology, palaeontology, physics."},
      {q:"2 \u00b7 Could each have come out otherwise? (Empirical?)", correct:"Yes", ok:"Right \u2014 these were claims about the real world, not just maths. Empirical."},
      {q:"3 \u00b7 Do the lines agree?", correct:"Yes", ok:"Right \u2014 all three point to fixed continents."}
    ];
    var rowsEl=el.querySelector("#testRows"), answered=0;
    rows.forEach(function(row){
      var div=document.createElement("div"); div.className="testrow";
      div.innerHTML='<div class="qline">'+row.q+'</div><div class="opts"></div><div class="fb"></div>';
      var opts=div.querySelector(".opts"), fb=div.querySelector(".fb");
      ["Yes","No"].forEach(function(val){
        var b=document.createElement("button"); b.className="opt"; b.textContent=val;
        b.addEventListener("click",function(){
          [].forEach.call(opts.children,function(x){ x.classList.add("dim"); });
          b.classList.remove("dim"); var right=(val===row.correct); b.classList.add(right?"pick-good":"pick-bad");
          fb.innerHTML = right?row.ok:("The honest answer in 1942 was \u201CYes.\u201D "+row.ok); fb.classList.add("show", right?"ok":"no");
          if(!div.dataset.done){ div.dataset.done="1"; answered++; if(answered===rows.length) certify(); }
        });
        opts.appendChild(b);
      });
      rowsEl.appendChild(div);
    });
    function certify(){
      var vs=el.querySelector("#vstrip"); vs.className="verdict-strip show vd-hold";
      vs.textContent="ALL THREE: YES  \u2192  THE TEST SAYS: ROBUST CONVERGENCE";
      fixedActive=[true,true,true]; redrawFixed();
      el.querySelector("#predictBlk").classList.add("shown");
    }
    el.querySelector("#timeBtn").addEventListener("click",function(){
      this.classList.add("dim");
      frozen=true;
      renderRadial(svgbox, fixed1968, null, {txt:"COLLAPSES",col:"var(--rust)",fill:"rgba(138,59,42,.13)"}, null);
      el.querySelector("#revealBlk").classList.add("shown");
      var moveActive=[true,true,true,true];
      function redrawMove(){ renderRadial(el.querySelector("#moveSvg"), move1968, moveActive, liveVerdict(move1968, moveActive), function(i){ moveActive[i]=!moveActive[i]; redrawMove(); }); }
      redrawMove();
      el.querySelector("#handoffBlk").classList.add("shown");
      nextBtn.disabled=false;
    });
  }

  go(0);
})();
</script>
